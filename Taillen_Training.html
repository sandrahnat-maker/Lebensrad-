<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<title>Taillen-Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@keyframes wimpel-swing{0%,100%{transform:rotate(-4deg) skewX(2deg);}50%{transform:rotate(4deg) skewX(-2deg);}}
@keyframes wimpel-swing2{0%,100%{transform:rotate(3deg) skewX(-1deg);}50%{transform:rotate(-3deg) skewX(1deg);}}
@keyframes wimpel-swing3{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(5deg);}}
@keyframes rope-sway{0%,100%{transform:scaleX(1);}50%{transform:scaleX(1.008);}}
@keyframes tier-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes spotlight{0%{left:-100%;}60%,100%{left:220%;}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.75);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardGlow{0%{box-shadow:0 3px 16px var(--shadow);}35%{box-shadow:0 0 0 3px rgba(184,41,74,0.18),0 4px 22px rgba(184,41,74,0.12);}100%{box-shadow:0 3px 16px var(--shadow);}}
@keyframes doneFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

:root{
  --bg:#fdf6ee;--card:#fffbf5;--text:#1e1208;--muted:rgba(30,18,8,0.45);
  --crimson:#b8294a;--crimson-l:rgba(184,41,74,0.10);
  --gold:#c9893a;--gold-l:rgba(201,137,58,0.13);
  --navy:#1a2744;--navy-l:rgba(26,39,68,0.07);
  --sage:#5e8a5a;--sage-l:rgba(94,138,90,0.12);
  --violet:#6a3f7a;
  --border:rgba(184,41,74,0.13);--shadow:rgba(30,18,8,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  background:var(--bg);
  font-family:"Raleway",sans-serif;
  color:var(--text);
  min-height:100vh;
  padding-bottom:7rem;
  background-image:
    repeating-linear-gradient(
      -6deg,
      rgba(184,41,74,0.022) 0px,rgba(184,41,74,0.022) 28px,
      transparent 28px,transparent 56px,
      rgba(201,137,58,0.018) 56px,rgba(201,137,58,0.018) 84px,
      transparent 84px,transparent 112px
    );
}

/* WIMPELKETTE */
.wimpelkette{position:relative;width:100%;height:48px;overflow:hidden;display:block;background:var(--bg);}
.wimpelkette svg{width:100%;height:48px;overflow:visible;animation:rope-sway 5s ease-in-out infinite;}
.wimpel-1{animation:wimpel-swing 2.8s ease-in-out infinite;}
.wimpel-2{animation:wimpel-swing2 3.2s ease-in-out infinite 0.3s;}
.wimpel-3{animation:wimpel-swing3 2.5s ease-in-out infinite 0.6s;}
.wimpel-4{animation:wimpel-swing 3.0s ease-in-out infinite 0.9s;}
.wimpel-5{animation:wimpel-swing2 2.7s ease-in-out infinite 1.2s;}
.wimpel-6{animation:wimpel-swing3 3.4s ease-in-out infinite 1.5s;}
.wimpel-7{animation:wimpel-swing 2.9s ease-in-out infinite 1.8s;}
.wimpel-8{animation:wimpel-swing2 2.6s ease-in-out infinite 2.1s;}
.wimpel-9{animation:wimpel-swing3 3.1s ease-in-out infinite 2.4s;}

/* HEADER */
header{
  padding:.9rem 1.2rem .75rem;
  border-bottom:2px solid var(--border);
  background:rgba(255,251,245,0.85);
  backdrop-filter:blur(3px);
  text-align:center;
}
.header-label{font-size:11px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;margin-bottom:.25rem;font-weight:500;}
.header-title{font-family:"Playfair Display",serif;font-size:1.5rem;font-style:italic;color:var(--text);line-height:1.3;}
.header-sub{font-family:"IM Fell English",serif;font-size:.9rem;font-style:italic;color:var(--muted);margin-top:.2rem;}

/* TIER-ZEILE */
.tier-zeile{display:flex;align-items:center;justify-content:center;gap:.2rem;padding:.3rem 1rem;font-size:.85rem;user-select:none;pointer-events:none;overflow:hidden;}
.tier-zeile .tier{display:inline-block;animation:tier-float 3s ease-in-out infinite;opacity:.5;font-size:.95rem;}
.tier-zeile .tier:nth-child(2){animation-delay:.4s;}
.tier-zeile .tier:nth-child(3){animation-delay:.8s;}
.tier-zeile .tier:nth-child(4){animation-delay:1.2s;}
.tier-zeile .tier:nth-child(5){animation-delay:1.6s;}
.tier-linie{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(184,41,74,0.2),transparent);}

/* CONTENT */
.content{padding:.7rem 1rem 0;max-width:600px;margin:0 auto;}

/* SECTION LABEL */
.section-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;padding-left:.2rem;font-weight:500;}

/* TABS */
.tabs-wrap{display:flex;gap:.35rem;margin-bottom:.5rem;}
.tab-btn{
  flex:1;padding:.6rem .5rem;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  cursor:pointer;font-family:"Raleway",sans-serif;font-size:.75rem;
  color:var(--muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  transition:all .25s;text-align:center;line-height:1.35;position:relative;overflow:hidden;
}
.tab-btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:repeating-linear-gradient(90deg,var(--crimson) 0%,var(--crimson) 25%,var(--gold) 25%,var(--gold) 50%,var(--navy) 50%,var(--navy) 75%,var(--violet) 75%,var(--violet) 100%);
  opacity:0;transition:opacity .25s;
}
.tab-btn.active{border-color:var(--crimson);color:var(--crimson);}
.tab-btn.active::before{opacity:.7;}
.tab-name{display:block;font-family:"Playfair Display",serif;font-style:italic;font-size:.85rem;text-transform:none;letter-spacing:0;margin-top:.1rem;}

/* MANEGE LINE */
.manege-line{display:flex;align-items:center;gap:.5rem;padding:.1rem 0;color:var(--crimson);opacity:.3;font-size:10px;letter-spacing:.3em;user-select:none;margin:.4rem 0;}
.manege-line::before,.manege-line::after{content:'';flex:1;height:1px;background:currentColor;}

/* EXERCISE CARD */
.exercise-card{
  background:var(--card);border-radius:12px;border:1px solid var(--border);
  box-shadow:0 3px 16px var(--shadow);margin-bottom:.5rem;
  overflow:hidden;position:relative;
  transition:all .25s cubic-bezier(.34,1.2,.64,1);
}
.exercise-card::after{
  content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.045),transparent);
  animation:spotlight 14s ease-in-out infinite;pointer-events:none;
}
.card-stripe{
  height:4px;
  background:repeating-linear-gradient(90deg,var(--crimson) 0%,var(--crimson) 25%,var(--gold) 25%,var(--gold) 50%,var(--navy) 50%,var(--navy) 75%,var(--violet) 75%,var(--violet) 100%);
  opacity:.45;
}
.exercise-card.active-card{border-color:var(--crimson);animation:cardGlow 1.8s ease infinite;}
.exercise-card.active-card .card-stripe{opacity:.9;}
.card-top{padding:.65rem .9rem .35rem;display:flex;align-items:baseline;gap:.45rem;}
.card-num{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;color:var(--crimson);}
.card-name{font-family:"Playfair Display",serif;font-size:1rem;font-style:italic;color:var(--text);flex:1;line-height:1.3;}
.card-badges{display:flex;gap:.3rem;flex-wrap:wrap;padding:.05rem .9rem .45rem;}
.badge{
  font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;
  color:var(--gold);background:var(--gold-l);
  border:1px solid rgba(201,137,58,0.25);border-radius:20px;
  padding:.08rem .48rem;font-family:"Raleway",sans-serif;font-weight:500;
}
.badge.navy{color:var(--navy);background:var(--navy-l);border-color:rgba(26,39,68,0.18);}
.card-desc{
  padding:.35rem .9rem .7rem;
  font-family:"IM Fell English",serif;font-size:.82rem;font-style:italic;
  color:var(--muted);line-height:1.5;
  border-top:1px dashed rgba(184,41,74,0.1);
}

/* DONE BANNER */
.done-banner{
  background:var(--card);border-radius:12px;border:1px solid rgba(94,138,90,0.3);
  box-shadow:0 3px 16px var(--shadow);padding:1.4rem 1.2rem;
  text-align:center;margin-top:.5rem;animation:doneFloat 3s ease-in-out infinite;
  overflow:hidden;position:relative;
}
.done-banner::before{
  content:'';display:block;height:5px;
  background:repeating-linear-gradient(90deg,var(--sage) 0%,var(--sage) 33%,var(--gold) 33%,var(--gold) 66%,var(--navy) 66%,var(--navy) 100%);
  opacity:.5;position:absolute;top:0;left:0;right:0;
}
.done-banner h2{font-family:"Playfair Display",serif;font-size:1.25rem;font-style:italic;color:var(--sage);margin:.4rem 0 .35rem;}
.done-banner p{font-family:"IM Fell English",serif;font-size:.88rem;font-style:italic;color:var(--muted);line-height:1.6;}

/* START OVERLAY */
.start-overlay{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:200;}
.start-btn{
  background:var(--crimson);border:2px solid rgba(201,137,58,0.35);
  color:#fffbf5;border-radius:30px;padding:.65rem 2rem;
  font-family:"Playfair Display",serif;font-size:1rem;font-style:italic;
  cursor:pointer;letter-spacing:.03em;
  box-shadow:0 4px 20px rgba(184,41,74,0.3);transition:all .25s;
}
.start-btn:active{background:#8f1f38;transform:scale(.98);}

/* TRAINER PANEL */
.trainer-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,251,245,0.97);
  border-top:2px solid var(--border);
  backdrop-filter:blur(8px);z-index:100;
  padding:.65rem 1rem .85rem;
  box-shadow:0 -4px 20px rgba(30,18,8,0.08);
}
.trainer-inner{max-width:600px;margin:0 auto;}
.progress-bar{height:3px;background:rgba(184,41,74,0.1);border-radius:2px;margin-bottom:.55rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--gold));border-radius:2px;transition:width .4s;}
.trainer-ex-name{font-family:"Playfair Display",serif;font-size:1rem;font-style:italic;color:var(--text);line-height:1.2;margin-bottom:.08rem;}
.trainer-ex-detail{font-family:"IM Fell English",serif;font-size:.8rem;font-style:italic;color:var(--muted);margin-bottom:.45rem;}
.timer-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.5rem;}
.timer-ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.timer-ring-wrap svg{transform:rotate(-90deg);}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:var(--text);}
.trainer-status{font-family:"IM Fell English",serif;font-size:.85rem;font-style:italic;color:var(--muted);flex:1;line-height:1.45;}
.trainer-controls{display:flex;gap:.4rem;}
.ctrl-btn{
  flex:1;padding:.55rem .4rem;
  border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--muted);
  font-family:"IM Fell English",serif;font-size:.88rem;font-style:italic;
  cursor:pointer;transition:all .2s;
}
.ctrl-btn:active{transform:scale(.97);}
.ctrl-btn.primary{
  flex:2;background:var(--crimson);border-color:var(--crimson);
  color:#fffbf5;font-size:.92rem;
  box-shadow:0 3px 14px rgba(184,41,74,0.2);
}
.ctrl-btn.primary:active{background:#8f1f38;}
.ctrl-btn.running{background:var(--sage);border-color:var(--sage);color:#fff;}

/* TOAST */
#toast{
  position:fixed;bottom:6rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy);border-radius:20px;padding:.45rem 1rem;
  font-family:"IM Fell English",serif;font-size:.85rem;font-style:italic;
  color:#f8e8b8;box-shadow:0 4px 20px rgba(26,39,68,0.18);
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  white-space:nowrap;z-index:500;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- WIMPELKETTE -->
<div class="wimpelkette" aria-hidden="true">
<svg viewBox="0 0 400 54" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,8 Q50,12 100,10 Q150,8 200,11 Q250,14 300,10 Q350,8 400,10" stroke="#1a2744" stroke-width="1" fill="none" opacity="0.3"/>
  <g class="wimpel-1" transform-origin="30 10"><polygon points="22,10 38,10 30,34" fill="#b8294a" opacity="0.8"/></g>
  <g class="wimpel-2" transform-origin="67 10"><polygon points="59,10 75,10 67,34" fill="#c9893a" opacity="0.8"/></g>
  <g class="wimpel-3" transform-origin="104 10"><polygon points="96,10 112,10 104,34" fill="#1a2744" opacity="0.75"/></g>
  <g class="wimpel-4" transform-origin="141 10"><polygon points="133,10 149,10 141,34" fill="#6a3f7a" opacity="0.75"/></g>
  <g class="wimpel-5" transform-origin="178 11"><polygon points="170,11 186,11 178,35" fill="#b8294a" opacity="0.8"/></g>
  <g class="wimpel-6" transform-origin="215 10"><polygon points="207,10 223,10 215,34" fill="#5e8a5a" opacity="0.7"/></g>
  <g class="wimpel-7" transform-origin="252 11"><polygon points="244,11 260,11 252,35" fill="#c9893a" opacity="0.8"/></g>
  <g class="wimpel-8" transform-origin="289 10"><polygon points="281,10 297,10 289,34" fill="#b8294a" opacity="0.8"/></g>
  <g class="wimpel-9" transform-origin="326 10"><polygon points="318,10 334,10 326,34" fill="#1a2744" opacity="0.75"/></g>
  <g class="wimpel-1" transform-origin="363 10"><polygon points="355,10 371,10 363,34" fill="#6a3f7a" opacity="0.75"/></g>
</svg>
</div>

<!-- HEADER -->
<header>
  <div class="header-label">Zirkus-Edition · 2 × Woche</div>
  <div class="header-title">Taillen-Training</div>
  <div class="header-sub">Core · Rotation · Kraft</div>
</header>

<!-- TIER-ZEILE -->
<div class="tier-zeile" aria-hidden="true">
  <span class="tier-linie"></span>
  <span class="tier">🏋️</span>
  <span class="tier">✦</span>
  <span class="tier">🎪</span>
  <span class="tier">✦</span>
  <span class="tier">💪</span>
  <span class="tier-linie"></span>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="section-label">Trainingstag</div>
  <div class="tabs-wrap">
    <button class="tab-btn active" id="tab0" onclick="switchDay(0)">
      Tag A <span class="tab-name">Core & Rotation</span>
    </button>
    <button class="tab-btn" id="tab1" onclick="switchDay(1)">
      Tag B <span class="tab-name">Rücken & Gesäß</span>
    </button>
  </div>
  <div class="manege-line">✦</div>
  <div class="section-label" id="exListLabel">Übungen · Tag A</div>
  <div id="exList"></div>
</div>

<!-- START -->
<div class="start-overlay" id="startOverlay">
  <button class="start-btn" onclick="startWorkout()">✦ Training starten ✦</button>
</div>

<!-- TRAINER PANEL -->
<div class="trainer-panel" id="trainerPanel" style="display:none">
  <div class="trainer-inner">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="trainer-ex-name" id="trainerExName">—</div>
    <div class="trainer-ex-detail" id="trainerExDetail"></div>
    <div class="timer-row">
      <div class="timer-ring-wrap">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(184,41,74,0.12)" stroke-width="5"/>
          <circle id="timerCircle" cx="28" cy="28" r="22" fill="none" stroke="#b8294a" stroke-width="5"
            stroke-dasharray="138.2" stroke-dashoffset="0" stroke-linecap="round"
            style="transition:stroke-dashoffset .5s,stroke .4s;"/>
        </svg>
        <div class="timer-num" id="timerNum">—</div>
      </div>
      <div class="trainer-status" id="trainerStatus">Bereit</div>
    </div>
    <div class="trainer-controls">
      <button class="ctrl-btn" onclick="prevStep()">◀ zurück</button>
      <button class="ctrl-btn primary" id="mainBtn" onclick="toggleMain()">▶ Los!</button>
      <button class="ctrl-btn" onclick="nextStep()">weiter ▶</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const DAYS = [
  {
    name:"Tag A — Core & Rotation",
    exercises:[
      {name:"Dead Bug",sets:3,reps:"8 pro Seite",rest:30,desc:"Auf dem Rücken. Arme & Beine gegengleich strecken — Lendenwirbel bleibt am Boden. Langsam & kontrolliert."},
      {name:"Seitlicher Plank",sets:3,reps:"20–30 Sek pro Seite",rest:30,desc:"Auf Knie ok. Hüfte heben, Körper in einer Linie. Tief atmen, nicht die Luft anhalten."},
      {name:"Pallof Press",sets:3,reps:"10 pro Seite",rest:30,desc:"Hantel auf Brusthöhe, langsam nach vorne strecken und zurück. Core hält dagegen — keine Rotation!"},
      {name:"Stehende Rotation",sets:3,reps:"12 pro Seite",rest:30,desc:"Hantel vor dem Bauch, Oberkörper dreht — Hüfte bleibt ruhig. Kontrolliert & langsam zurück."},
      {name:"Balanceboard einbeinig",sets:3,reps:"45 Sek pro Seite",rest:30,desc:"Ein Fuß auf dem Board, Blick fixieren. Tiefe Atemzüge zum Stabilisieren."},
      {name:"Bird Dog",sets:3,reps:"8 pro Seite",rest:30,desc:"Im Vierfüßler: Arm & Gegenbein gestreckt halten, 2 Sek pausieren. Rücken bleibt neutral."}
    ]
  },
  {
    name:"Tag B — Rücken, Schultern & Gesäß",
    exercises:[
      {name:"Einarmiges Rudern",sets:3,reps:"10 pro Seite",rest:45,desc:"Eine Hand abstützen. Ellbogen nah am Körper hochziehen. Schulterblatt am Ende einrollen."},
      {name:"Glute Bridge",sets:3,reps:"12 Wdh",rest:30,desc:"Hantel auf Hüften. Hüfte hoch pressen, oben kurz halten. Gesäß aktiv anspannen."},
      {name:"Schulterdrücken stehend",sets:3,reps:"10 Wdh",rest:45,desc:"Core aktiv, Hanteln auf Schulterhöhe. Gerade nach oben drücken — kein Hohlkreuz!"},
      {name:"Romanian Deadlift",sets:3,reps:"10 Wdh",rest:45,desc:"Hanteln vor den Oberschenkeln, Knie leicht gebeugt. Hinunter bis Dehnung, dann Hüfte nach vorne drücken."},
      {name:"Seitheben mit Hanteln",sets:3,reps:"12 Wdh",rest:30,desc:"Arme seitlich heben bis Schulterhöhe, kleiner Finger leicht nach oben. Kontrolliert senken — kein Schwung!"},
      {name:"Balanceboard Kniebeuge",sets:3,reps:"8–10 Wdh",rest:45,desc:"Beide Füße auf dem Board, hüftbreit. Langsam in die Kniebeuge — Core aktiv."}
    ]
  }
];

function buildSteps(d){
  const steps=[];
  DAYS[d].exercises.forEach((ex,ei)=>{
    for(let s=1;s<=ex.sets;s++){
      steps.push({type:'set',ex,ei,setNum:s});
      if(s<ex.sets) steps.push({type:'rest',ex,ei,dur:ex.rest});
    }
    if(ei<DAYS[d].exercises.length-1) steps.push({type:'rest',ex,ei,dur:ex.rest});
  });
  return steps;
}

let dayIdx=0,steps=buildSteps(0),stepIdx=0;
let running=false,timerInterval=null,timerRem=0,timerTotal=0;
let started=false,done=false;

function switchDay(d){
  if(started&&!confirm("Training abbrechen und Tag wechseln?")) return;
  stopTimer();
  dayIdx=d;steps=buildSteps(d);stepIdx=0;running=false;started=false;done=false;timerRem=0;
  document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('active',i===d));
  document.getElementById('exListLabel').textContent=`Übungen · Tag ${d===0?'A':'B'}`;
  document.getElementById('trainerPanel').style.display='none';
  document.getElementById('startOverlay').style.display='';
  renderList();
}

function renderList(){
  const day=DAYS[dayIdx];
  let html='';
  day.exercises.forEach((ex,i)=>{
    const isActive=started&&!done&&steps[stepIdx]&&steps[stepIdx].ei===i;
    html+=`<div class="exercise-card${isActive?' active-card':''}" id="card-${i}">
      <div class="card-stripe"></div>
      <div class="card-top">
        <span class="card-num">${i+1}.</span>
        <span class="card-name">${ex.name}</span>
      </div>
      <div class="card-badges">
        <span class="badge">${ex.sets} Sätze</span>
        <span class="badge">${ex.reps}</span>
        <span class="badge navy">Pause ${ex.rest}s</span>
      </div>
      <div class="card-desc">${ex.desc}</div>
    </div>`;
  });
  if(done){
    html+=`<div class="done-banner">
      <h2>✦ Bravo! ✦</h2>
      <p>Training abgeschlossen.<br>Dein Core wird es dir danken.</p>
      <div style="margin-top:.75rem;display:flex;gap:.5rem;justify-content:center;opacity:.4;font-size:.9rem;">
        <span style="animation:tier-float 3s ease-in-out infinite 0s">🏋️</span>
        <span style="animation:tier-float 3s ease-in-out infinite 0.4s">✦</span>
        <span style="animation:tier-float 3s ease-in-out infinite 0.8s">🎪</span>
        <span style="animation:tier-float 3s ease-in-out infinite 1.2s">✦</span>
        <span style="animation:tier-float 3s ease-in-out infinite 1.6s">💪</span>
      </div>
    </div>`;
  }
  document.getElementById('exList').innerHTML=html;
}

function renderTrainer(){
  if(!started) return;
  document.getElementById('trainerPanel').style.display='block';
  if(done){
    document.getElementById('trainerExName').textContent='✦ Fertig!';
    document.getElementById('trainerExDetail').textContent='Ausgezeichnet!';
    document.getElementById('timerNum').textContent='✓';
    document.getElementById('trainerStatus').textContent='Training abgeschlossen!';
    document.getElementById('mainBtn').textContent='⟳ Nochmal';
    document.getElementById('mainBtn').className='ctrl-btn primary';
    document.getElementById('timerCircle').setAttribute('stroke-dashoffset','0');
    document.getElementById('progressFill').style.width='100%';
    return;
  }
  const step=steps[stepIdx];
  document.getElementById('progressFill').style.width=(stepIdx/steps.length*100)+'%';
  if(step.type==='set'){
    document.getElementById('trainerExName').textContent=step.ex.name;
    document.getElementById('trainerExDetail').textContent=`Satz ${step.setNum} von ${step.ex.sets} · ${step.ex.reps}`;
    document.getElementById('timerNum').textContent=running?'▶':'○';
    document.getElementById('timerCircle').setAttribute('stroke','#b8294a');
    document.getElementById('timerCircle').setAttribute('stroke-dashoffset','0');
    document.getElementById('trainerStatus').textContent=running?'Ausführen — dann "✓ Satz done" drücken':'Bereit — drücke "▶ Los!"';
    document.getElementById('mainBtn').textContent=running?'✓ Satz done':'▶ Los!';
    document.getElementById('mainBtn').className='ctrl-btn primary'+(running?' running':'');
  } else {
    document.getElementById('trainerExName').textContent='Pause';
    document.getElementById('trainerExDetail').textContent=`nach: ${step.ex.name}`;
    document.getElementById('timerNum').textContent=timerRem||step.dur;
    document.getElementById('timerCircle').setAttribute('stroke','#c9893a');
    const off=timerTotal>0?(1-timerRem/timerTotal)*138.2:0;
    document.getElementById('timerCircle').setAttribute('stroke-dashoffset',off);
    document.getElementById('trainerStatus').textContent=running?'Erholen · durchatmen · loslassen …':`${timerRem||step.dur}s Pause — bereit?`;
    document.getElementById('mainBtn').textContent=running?'⏸ Pause':'▶ Weiter';
    document.getElementById('mainBtn').className='ctrl-btn primary'+(running?' running':'');
  }
  const card=document.getElementById('card-'+step.ei);
  if(card) card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-AT';u.rate=0.92;u.pitch=1.05;
  window.speechSynthesis.speak(u);
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

function startTimer(dur){
  timerRem=dur;timerTotal=dur;clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerRem--;renderTrainer();
    if(timerRem===3) speak('Drei. Zwei. Eins.');
    if(timerRem<=0){clearInterval(timerInterval);running=false;advanceFromRest();}
  },1000);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}

function toggleMain(){
  if(done){restart();return;}
  const step=steps[stepIdx];
  if(step.type==='set'){
    if(!running){
      running=true;
      speak(`${step.ex.name}. Satz ${step.setNum}. ${step.ex.reps}. Los!`);
    } else {
      running=false;showToast('✦ Satz geschafft!');
      stepIdx++;
      if(stepIdx>=steps.length){finish();return;}
      const next=steps[stepIdx];
      if(next.type==='rest'){speak(`Super! Pause — ${next.dur} Sekunden.`);running=true;startTimer(next.dur);}
      else speak(`Nächste Übung: ${next.ex.name}.`);
    }
  } else {
    if(!running){running=true;startTimer(timerRem>0?timerRem:step.dur);speak(`Pause — ${step.dur} Sekunden.`);}
    else{running=false;stopTimer();}
  }
  renderList();renderTrainer();
}

function advanceFromRest(){
  stepIdx++;
  if(stepIdx>=steps.length){finish();return;}
  speak(`Nächste Übung: ${steps[stepIdx].ex.name}. Satz ${steps[stepIdx].setNum}.`);
  renderList();renderTrainer();
}

function nextStep(){
  stopTimer();running=false;if(done) return;
  const step=steps[stepIdx];
  stepIdx++;if(stepIdx>=steps.length){finish();return;}
  const next=steps[stepIdx];
  if(next.type==='rest'){running=true;startTimer(next.dur);speak(`Pause. ${next.dur} Sekunden.`);}
  else speak(`${next.ex.name}. Satz ${next.setNum}.`);
  renderList();renderTrainer();
}

function prevStep(){
  stopTimer();running=false;done=false;
  if(stepIdx>0) stepIdx--;
  while(stepIdx>0&&steps[stepIdx].type==='rest') stepIdx--;
  timerRem=0;renderList();renderTrainer();
}

function finish(){
  done=true;running=false;
  speak('Training abgeschlossen! Hervorragend!');
  renderList();renderTrainer();
}

function restart(){
  stopTimer();stepIdx=0;running=false;done=false;timerRem=0;
  renderList();renderTrainer();
  speak(`Tag ${dayIdx===0?'A':'B'} — von vorne. Los!`);
}

function startWorkout(){
  started=true;
  document.getElementById('startOverlay').style.display='none';
  speak(`Tag ${dayIdx===0?'A':'B'}. ${DAYS[dayIdx].name}. Erste Übung: ${DAYS[dayIdx].exercises[0].name}. Bereit?`);
  renderList();renderTrainer();
}

renderList();
</script>
</body>
</html>
