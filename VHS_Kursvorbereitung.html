<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<title>Kursvorbereitung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@keyframes wimpel-swing{0%,100%{transform:rotate(-4deg) skewX(2deg);}50%{transform:rotate(4deg) skewX(-2deg);}}
@keyframes wimpel-swing2{0%,100%{transform:rotate(3deg) skewX(-1deg);}50%{transform:rotate(-3deg) skewX(1deg);}}
@keyframes wimpel-swing3{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(5deg);}}
@keyframes rope-sway{0%,100%{transform:scaleX(1);}50%{transform:scaleX(1.008);}}
@keyframes tier-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes spotlight{0%{left:-100%;}60%,100%{left:220%;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
:root{
  --bg:#fdf6ee;--card:#fffbf5;--text:#1e1208;--muted:rgba(30,18,8,0.45);
  --crimson:#b8294a;--crimson-l:rgba(184,41,74,0.10);
  --gold:#c9893a;--gold-l:rgba(201,137,58,0.13);
  --navy:#1a2744;--navy-l:rgba(26,39,68,0.07);
  --sage:#5e8a5a;--sage-l:rgba(94,138,90,0.12);
  --violet:#6a3f7a;
  --border:rgba(184,41,74,0.13);--shadow:rgba(30,18,8,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  background:var(--bg);font-family:"Raleway",sans-serif;color:var(--text);
  min-height:100vh;padding-bottom:4rem;
  background-image:repeating-linear-gradient(-6deg,rgba(184,41,74,0.022) 0px,rgba(184,41,74,0.022) 28px,transparent 28px,transparent 56px,rgba(201,137,58,0.018) 56px,rgba(201,137,58,0.018) 84px,transparent 84px,transparent 112px);
}
.wimpelkette{position:relative;width:100%;height:40px;overflow:hidden;display:block;background:var(--bg);}
.wimpelkette svg{width:100%;height:40px;overflow:visible;animation:rope-sway 5s ease-in-out infinite;}
.wimpel-1{animation:wimpel-swing 2.8s ease-in-out infinite;}
.wimpel-2{animation:wimpel-swing2 3.2s ease-in-out infinite 0.3s;}
.wimpel-3{animation:wimpel-swing3 2.5s ease-in-out infinite 0.6s;}
.wimpel-4{animation:wimpel-swing 3.0s ease-in-out infinite 0.9s;}
.wimpel-5{animation:wimpel-swing2 2.7s ease-in-out infinite 1.2s;}
.wimpel-6{animation:wimpel-swing3 3.4s ease-in-out infinite 1.5s;}
.wimpel-7{animation:wimpel-swing 2.9s ease-in-out infinite 1.8s;}
.wimpel-8{animation:wimpel-swing2 2.6s ease-in-out infinite 2.1s;}
.wimpel-9{animation:wimpel-swing3 3.1s ease-in-out infinite 2.4s;}
header{padding:1rem 1.2rem .85rem;border-bottom:2px solid var(--border);background:rgba(255,251,245,0.92);backdrop-filter:blur(3px);position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--crimson);text-decoration:none;opacity:.7;margin-bottom:.4rem;background:none;border:none;cursor:pointer;padding:0;}
.back-btn:active{opacity:1;}
.header-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;font-weight:500;}
.header-title{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;color:var(--text);line-height:1.2;}
.header-sub{font-family:"IM Fell English",serif;font-size:14px;font-style:italic;color:var(--muted);margin-top:.15rem;}
.rainbow-stripe{height:5px;background:repeating-linear-gradient(90deg,var(--crimson) 0%,var(--crimson) 20%,var(--gold) 20%,var(--gold) 40%,var(--navy) 40%,var(--navy) 60%,var(--violet) 60%,var(--violet) 80%,var(--sage) 80%,var(--sage) 100%);opacity:.6;margin-bottom:.2rem;}
.z-card{background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:0 3px 16px var(--shadow);margin:.5rem 1rem;overflow:hidden;position:relative;}
.z-card::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.055),transparent);animation:spotlight 10s ease-in-out infinite;pointer-events:none;}
.z-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .9rem;border-bottom:1px solid rgba(184,41,74,0.07);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .2s;}
.z-item:last-child{border-bottom:none;}
.z-item.done{opacity:.28;}
.z-item.done .z-name{text-decoration:line-through;text-decoration-color:rgba(184,41,74,0.3);}
.z-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(184,41,74,0.3);flex-shrink:0;margin-top:2px;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.z-item.done .z-check{background:var(--sage-l);border-color:var(--sage);color:var(--sage);}
.z-item.done .z-check::after{content:"✦";}
.z-name{font-size:16px;color:var(--text);line-height:1.35;}
.z-sub{font-size:13px;font-style:italic;color:var(--muted);margin-top:1px;font-family:"IM Fell English",serif;}
.z-sec{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--crimson);padding:.7rem 1rem .2rem;opacity:.8;font-weight:500;}
.z-info{margin:.3rem 1rem .4rem;padding:.5rem .8rem;background:var(--gold-l);border-left:2px solid var(--gold);font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.6;}
.section-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:.8rem 1rem .3rem;padding-left:.2rem;font-weight:500;}
.z-progress{margin:.4rem 1rem .2rem;}
.z-progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:.3rem;}
.z-progress-bar{height:3px;background:var(--border);border-radius:10px;overflow:hidden;}
.z-progress-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--gold));border-radius:10px;transition:width .4s ease;}
.z-reset{position:fixed;bottom:1.2rem;right:1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:.4rem 1rem;font-size:13px;font-family:"IM Fell English",serif;font-style:italic;cursor:pointer;}
.z-reset:active{background:var(--crimson-l);color:var(--crimson);}
.tier-zeile{display:flex;align-items:center;justify-content:center;gap:.2rem;padding:.3rem 1rem;user-select:none;pointer-events:none;overflow:hidden;}
.tier-zeile .tier{display:inline-block;animation:tier-float 3s ease-in-out infinite;opacity:.5;font-size:.9rem;}
.tier-zeile .tier:nth-child(2){animation-delay:.4s;}.tier-zeile .tier:nth-child(3){animation-delay:.8s;}.tier-zeile .tier:nth-child(4){animation-delay:1.2s;}.tier-zeile .tier:nth-child(5){animation-delay:1.6s;}
.tier-linie{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(184,41,74,0.2),transparent);}
.manege-line{display:flex;align-items:center;gap:.5rem;padding:.1rem 1rem;color:var(--crimson);opacity:.3;font-size:11px;letter-spacing:.3em;user-select:none;}
.manege-line::before,.manege-line::after{content:'';flex:1;height:1px;background:currentColor;}
</style>

<style>
/* App-spezifisches CSS */
* { box-sizing: border-box; margin: 0; padding: 0; }


    header {
      background: #faf3e8;
      color: #2e2010;
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1.5px solid rgba(180,130,70,0.3);
    }

    .header-inner { max-width: 860px; margin: 0 auto; }

    .vhs-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8943a;
      margin-bottom: 0.4rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    .day-tabs {
      margin-top: 1.2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .tab-btn {
      padding: 0.4rem 1rem;
      border: 2px solid rgba(180,130,70,0.35);
      border-radius: 2px;
      background: transparent;
      color: #c8943a;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family:'Cormorant Garamond',serif;
      transition: all 0.15s;
    }

    .tab-btn.active {
      border-color: #c8943a;
      background: #c8943a;
      color: #2e2010;
    }

    .reset-btn {
      margin-left: auto;
      padding: 0.4rem 1rem;
      border: 2px solid rgba(180,130,70,0.35);
      border-radius: 2px;
      background: transparent;
      color: #8a7a60;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family:'Cormorant Garamond',serif;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .cards { display: grid; gap: 1.5rem; }

    .card {
      background: #fffdf8;
      border: 2px solid #ddd5c5;
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .card.done { box-shadow: 0 2px 12px rgba(0,0,0,0.15); }

    .card-header {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: background 0.3s;
    }

    .card-icon {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      font-weight: bold;
    }

    .card-title { font-weight: bold; font-size: 1.05rem; color: #2e2010; transition: color 0.3s; }
    .card-subtitle { font-size: 0.82rem; color: #6b5a3e; transition: color 0.3s; }
    .card-count { text-align: right; }
    .count-num { font-size: 1.4rem; font-weight: bold; line-height: 1; transition: color 0.3s; }
    .count-label { font-size: 0.7rem; color: #999; letter-spacing: 0.05em; }

    .progress-bar { height: 3px; background: #eee; }
    .progress-fill { height: 100%; transition: width 0.4s ease; }

    .task-list { padding: 0.5rem 0; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      border-bottom: 1px solid #f0ebe0;
      transition: background 0.2s;
      list-style: none;
    }

    .task-item:last-child { border-bottom: none; }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #c5b99a;
      border-radius: 2px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg { display: none; }
    .checkbox.checked svg { display: block; }

    .task-label {
      font-size: 0.9rem;
      color: #2e2010;
      font-family:'Cormorant Garamond',serif;
      transition: all 0.2s;
    }

    .task-label.done-text {
      text-decoration: line-through;
      color: #8a7a60;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #a09070;
      letter-spacing: 0.05em;
      padding-bottom: 2rem;
    }
</style>
</head>
<body>
<div class="wimpelkette" aria-hidden="true"><svg viewBox="0 0 400 44" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,7 Q50,11 100,9 Q150,7 200,10 Q250,13 300,9 Q350,7 400,9" stroke="#1a2744" stroke-width="1" fill="none" opacity="0.3"/><g class="wimpel-1" transform-origin="30 9"><polygon points="23,9 37,9 30,28" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-2" transform-origin="67 9"><polygon points="60,9 74,9 67,28" fill="#c9893a" opacity="0.8"/></g><g class="wimpel-3" transform-origin="104 9"><polygon points="97,9 111,9 104,28" fill="#1a2744" opacity="0.75"/></g><g class="wimpel-4" transform-origin="141 9"><polygon points="134,9 148,9 141,28" fill="#6a3f7a" opacity="0.75"/></g><g class="wimpel-5" transform-origin="178 10"><polygon points="171,10 185,10 178,29" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-6" transform-origin="215 9"><polygon points="208,9 222,9 215,28" fill="#5e8a5a" opacity="0.7"/></g><g class="wimpel-7" transform-origin="252 10"><polygon points="245,10 259,10 252,29" fill="#c9893a" opacity="0.8"/></g><g class="wimpel-8" transform-origin="289 9"><polygon points="282,9 296,9 289,28" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-9" transform-origin="326 9"><polygon points="319,9 333,9 326,28" fill="#1a2744" opacity="0.75"/></g><g class="wimpel-1" transform-origin="363 9"><polygon points="356,9 370,9 363,28" fill="#6a3f7a" opacity="0.75"/></g></svg></div>
<header>
<div class="rainbow-stripe"></div>
<div class="header-eyebrow">VHS · Unterricht</div>
<div class="header-title">Kursvorbereitung</div>
<div class="header-sub">Checklisten & Materialien</div>
</header>
<main>
  <div class="cards" id="cards"></div>
  <footer>Montag &#8212; Vorbereitung &#183; Dienstag &#8212; Kopieren &amp; Verteilen</footer>
</main>

<script>
  const courses = [
    { id: 1, name: "Singrienergasse", subtitle: "Gruppe 1 / 2", color: "#e8d5b7", accent: "#c8943a", icon: "\u2460 \u2461" },
    { id: 2, name: "Singrienergasse", subtitle: "Gruppe 3",    color: "#d4e8d0", accent: "#5a9e52", icon: "\u2462" },
    { id: 3, name: "Rosasgasse",      subtitle: "Gruppe 1 \u2013 4",color: "#d0dde8", accent: "#4a7aa8", icon: "\u2460 \u2461 \u2462 \u2463" },
    { id: 4, name: "Johann Hoffmann Platz", subtitle: "Gruppe 1 / 2", color: "#e8d0d8", accent: "#a8476a", icon: "\u2460 \u2461" },
  ];

  const tasks = [
    { id: "korrektur",   label: "Arbeiten vom letzten Mal korrigieren", day: "mo" },
    { id: "feedback",    label: "Feedback schreiben",                   day: "mo" },
    { id: "ordner",      label: "Kurs-Ordner in Ordnung bringen",       day: "mo" },
    { id: "anwesenheit", label: "Anwesenheit dokumentieren",            day: "mo" },
    { id: "sammelpass",  label: "Sammelp\u00E4sse nachkleben (falls n\u00F6tig)", day: "mo" },
    { id: "drehbuch",    label: "Neues Drehbuch vorbereiten",           day: "mo" },
    { id: "material",    label: "Alle Lernmaterialien vorbereiten",     day: "mo" },
    { id: "fuellen",     label: "Ordner f\u00FCr alle Kurse fertig f\u00FCllen",  day: "di" },
    { id: "kopieren",    label: "Kopieren f\u00FCr kommende Kurse",          day: "di" },
  ];

  let activeDay = "mo";
  let checked = JSON.parse(localStorage.getItem("vhs_checked") || "{}");

  function save() {
    localStorage.setItem("vhs_checked", JSON.stringify(checked));
  }

  function setDay(day) {
    activeDay = day;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-btn")[day === "mo" ? 0 : 1].classList.add("active");
    render();
  }

  function toggle(courseId, taskId) {
    const key = `${courseId}-${taskId}`;
    checked[key] = !checked[key];
    save();
    render();
  }

  function resetAll() {
    if (confirm("Alle H\u00E4kchen zur\u00FCcksetzen?")) {
      checked = {};
      save();
      render();
    }
  }

  function isChecked(courseId, taskId) {
    return !!checked[`${courseId}-${taskId}`];
  }

  function render() {
    const filtered = tasks.filter(t => t.day === activeDay);
    const container = document.getElementById("cards");
    container.innerHTML = "";

    courses.forEach(course => {
      const done = filtered.filter(t => isChecked(course.id, t.id)).length;
      const total = filtered.length;
      const pct = Math.round((done / total) * 100);
      const allDone = done === total;

      const card = document.createElement("div");
      card.className = "z-card" + (allDone ? " done" : "");
      card.style.borderColor = allDone ? course.accent : "#ddd5c5";
      if (allDone) card.style.boxShadow = `0 2px 12px ${course.accent}55`;

      const headerBg = allDone ? course.accent : course.color;
      const titleColor = allDone ? "#fff" : "#2e2010";
      const subtitleColor = allDone ? "#ffffffbb" : "#6b5a3e";
      const iconColor = allDone ? "#fff8" : course.accent;
      const countColor = allDone ? "#fff" : course.accent;

      card.innerHTML = `
        <div class="card-header" style="background:${headerBg}">
          <div class="card-icon" style="color:${iconColor}">${course.icon}</div>
          <div style="flex:1">
            <div class="card-title" style="color:${titleColor}">${course.name}</div>
            <div class="card-subtitle" style="color:${subtitleColor}">${course.subtitle}</div>
          </div>
          <div class="card-count">
            <div class="count-num" style="color:${countColor}">${done}/${total}</div>
            <div class="count-label" style="color:${allDone ? '#ffffffaa' : '#999'}">erledigt</div>
          </div>
        </div>
        <div class="z-progress-bar">
          <div class="z-progress-fill" style="width:${pct}%;background:${course.accent}"></div>
        </div>
        <ul class="task-list" id="tasks-${course.id}"></ul>
      `;

      container.appendChild(card);

      const taskList = card.querySelector(`#tasks-${course.id}`);
      filtered.forEach(task => {
        const chk = isChecked(course.id, task.id);
        const li = document.createElement("li");
        li.className = "task-item";
        if (chk) li.style.background = `${course.color}88`;
        li.style.setProperty("--accent", course.accent);
        li.innerHTML = `
          <div class="checkbox ${chk ? 'checked' : ''}" style="${chk ? '' : ''}">
            <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
              <path d="M1 4L4 7L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="task-label ${chk ? 'done-text' : ''}">${task.label}</span>
        `;
        li.addEventListener("click", () => toggle(course.id, task.id));
        taskList.appendChild(li);
      });
    });
  }

  render();
</script>
</body>
</html>
