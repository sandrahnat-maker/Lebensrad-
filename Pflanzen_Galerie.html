<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<title>Meine Pflanzen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@keyframes wimpel-swing{0%,100%{transform:rotate(-4deg) skewX(2deg);}50%{transform:rotate(4deg) skewX(-2deg);}}
@keyframes wimpel-swing2{0%,100%{transform:rotate(3deg) skewX(-1deg);}50%{transform:rotate(-3deg) skewX(1deg);}}
@keyframes wimpel-swing3{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(5deg);}}
@keyframes rope-sway{0%,100%{transform:scaleX(1);}50%{transform:scaleX(1.008);}}
@keyframes tier-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes spotlight{0%{left:-100%;}60%,100%{left:220%;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
:root{
  --bg:#fdf6ee;--card:#fffbf5;--text:#1e1208;--muted:rgba(30,18,8,0.45);
  --crimson:#b8294a;--crimson-l:rgba(184,41,74,0.10);
  --gold:#c9893a;--gold-l:rgba(201,137,58,0.13);
  --navy:#1a2744;--navy-l:rgba(26,39,68,0.07);
  --sage:#5e8a5a;--sage-l:rgba(94,138,90,0.12);
  --violet:#6a3f7a;
  --border:rgba(184,41,74,0.13);--shadow:rgba(30,18,8,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  background:var(--bg);font-family:"Raleway",sans-serif;color:var(--text);
  min-height:100vh;padding-bottom:4rem;
  background-image:repeating-linear-gradient(-6deg,rgba(184,41,74,0.022) 0px,rgba(184,41,74,0.022) 28px,transparent 28px,transparent 56px,rgba(201,137,58,0.018) 56px,rgba(201,137,58,0.018) 84px,transparent 84px,transparent 112px);
}
.wimpelkette{position:relative;width:100%;height:40px;overflow:hidden;display:block;background:var(--bg);}
.wimpelkette svg{width:100%;height:40px;overflow:visible;animation:rope-sway 5s ease-in-out infinite;}
.wimpel-1{animation:wimpel-swing 2.8s ease-in-out infinite;}
.wimpel-2{animation:wimpel-swing2 3.2s ease-in-out infinite 0.3s;}
.wimpel-3{animation:wimpel-swing3 2.5s ease-in-out infinite 0.6s;}
.wimpel-4{animation:wimpel-swing 3.0s ease-in-out infinite 0.9s;}
.wimpel-5{animation:wimpel-swing2 2.7s ease-in-out infinite 1.2s;}
.wimpel-6{animation:wimpel-swing3 3.4s ease-in-out infinite 1.5s;}
.wimpel-7{animation:wimpel-swing 2.9s ease-in-out infinite 1.8s;}
.wimpel-8{animation:wimpel-swing2 2.6s ease-in-out infinite 2.1s;}
.wimpel-9{animation:wimpel-swing3 3.1s ease-in-out infinite 2.4s;}
header{padding:1rem 1.2rem .85rem;border-bottom:2px solid var(--border);background:rgba(255,251,245,0.92);backdrop-filter:blur(3px);position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--crimson);text-decoration:none;opacity:.7;margin-bottom:.4rem;background:none;border:none;cursor:pointer;padding:0;}
.back-btn:active{opacity:1;}
.header-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;font-weight:500;}
.header-title{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;color:var(--text);line-height:1.2;}
.header-sub{font-family:"IM Fell English",serif;font-size:14px;font-style:italic;color:var(--muted);margin-top:.15rem;}
.rainbow-stripe{height:5px;background:repeating-linear-gradient(90deg,var(--crimson) 0%,var(--crimson) 20%,var(--gold) 20%,var(--gold) 40%,var(--navy) 40%,var(--navy) 60%,var(--violet) 60%,var(--violet) 80%,var(--sage) 80%,var(--sage) 100%);opacity:.6;margin-bottom:.2rem;}
.z-card{background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:0 3px 16px var(--shadow);margin:.5rem 1rem;overflow:hidden;position:relative;}
.z-card::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.055),transparent);animation:spotlight 10s ease-in-out infinite;pointer-events:none;}
.z-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .9rem;border-bottom:1px solid rgba(184,41,74,0.07);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .2s;}
.z-item:last-child{border-bottom:none;}
.z-item.done{opacity:.28;}
.z-item.done .z-name{text-decoration:line-through;text-decoration-color:rgba(184,41,74,0.3);}
.z-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(184,41,74,0.3);flex-shrink:0;margin-top:2px;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.z-item.done .z-check{background:var(--sage-l);border-color:var(--sage);color:var(--sage);}
.z-item.done .z-check::after{content:"✦";}
.z-name{font-size:16px;color:var(--text);line-height:1.35;}
.z-sub{font-size:13px;font-style:italic;color:var(--muted);margin-top:1px;font-family:"IM Fell English",serif;}
.z-sec{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--crimson);padding:.7rem 1rem .2rem;opacity:.8;font-weight:500;}
.z-info{margin:.3rem 1rem .4rem;padding:.5rem .8rem;background:var(--gold-l);border-left:2px solid var(--gold);font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.6;}
.section-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:.8rem 1rem .3rem;padding-left:.2rem;font-weight:500;}
.z-progress{margin:.4rem 1rem .2rem;}
.z-progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:.3rem;}
.z-progress-bar{height:3px;background:var(--border);border-radius:10px;overflow:hidden;}
.z-progress-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--gold));border-radius:10px;transition:width .4s ease;}
.z-reset{position:fixed;bottom:1.2rem;right:1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:.4rem 1rem;font-size:13px;font-family:"IM Fell English",serif;font-style:italic;cursor:pointer;}
.z-reset:active{background:var(--crimson-l);color:var(--crimson);}
.tier-zeile{display:flex;align-items:center;justify-content:center;gap:.2rem;padding:.3rem 1rem;user-select:none;pointer-events:none;overflow:hidden;}
.tier-zeile .tier{display:inline-block;animation:tier-float 3s ease-in-out infinite;opacity:.5;font-size:.9rem;}
.tier-zeile .tier:nth-child(2){animation-delay:.4s;}.tier-zeile .tier:nth-child(3){animation-delay:.8s;}.tier-zeile .tier:nth-child(4){animation-delay:1.2s;}.tier-zeile .tier:nth-child(5){animation-delay:1.6s;}
.tier-linie{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(184,41,74,0.2),transparent);}
.manege-line{display:flex;align-items:center;gap:.5rem;padding:.1rem 1rem;color:var(--crimson);opacity:.3;font-size:11px;letter-spacing:.3em;user-select:none;}
.manege-line::before,.manege-line::after{content:'';flex:1;height:1px;background:currentColor;}
</style>

<style>
/* App-spezifisches CSS */
.back{display:inline-flex;align-items:center;gap:.3rem;font-size:13px;color:var(--gold);text-decoration:none;padding:1rem 1.2rem .2rem;opacity:.8;}
header{padding:.2rem 1.2rem .9rem;border-bottom:1px solid var(--border);}
.lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.2rem;}
.ttl{font-family:"Playfair Display",serif;font-size:1.5rem;font-style:italic;font-weight:400;}
.sub{font-size:13px;color:var(--muted);font-style:italic;margin-top:.2rem;}
.info-box{margin:.8rem 1rem .4rem;padding:.6rem .9rem;background:rgba(122,154,90,0.08);border-left:2.5px solid var(--sage);border-radius:0 10px 10px 0;font-size:13px;font-style:italic;color:var(--muted);line-height:1.6;}
.feel-box{margin:.4rem 1rem .6rem;padding:.55rem .9rem;background:rgba(200,148,58,0.07);border-left:2.5px solid var(--gold-light);border-radius:0 10px 10px 0;font-size:13px;font-style:italic;color:var(--muted);line-height:1.6;}
.counter{font-size:12px;color:var(--muted);text-align:right;padding:.2rem 1.2rem .4rem;}
.counter .due-count{color:var(--due);font-weight:600;}
.plant{background:var(--card);border-radius:16px;margin:.45rem 1rem;border:1.5px solid var(--border);box-shadow:0 2px 10px var(--shadow);overflow:hidden;transition:opacity .2s;}
.plant.due{border-color:rgba(192,57,43,0.4);background:#fffaf9;}
.plant.done{opacity:.45;}
.plant-top{display:flex;align-items:center;gap:.65rem;padding:.75rem .9rem;cursor:pointer;}
.plant-icon{font-size:1.4rem;flex-shrink:0;}
.plant-info{flex:1;min-width:0;}
.plant-name{font-family:"Playfair Display",serif;font-size:1rem;font-style:italic;font-weight:400;color:var(--text);line-height:1.2;}
.plant.done .plant-name{text-decoration:line-through;text-decoration-color:var(--gold-light);}
.plant-latin{font-size:11px;color:var(--muted);font-style:italic;margin-top:.08rem;}
.plant-freq{font-size:11px;color:var(--sage);margin-top:.15rem;}
.plant-due-badge{font-size:11px;color:var(--due);margin-top:.1rem;font-style:italic;}
.plant-ok-badge{font-size:11px;color:var(--sage);margin-top:.1rem;font-style:italic;}
.plant-check{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer;}
.plant.done .plant-check{background:var(--sage);border-color:var(--sage);}
.plant.done .plant-check::after{content:"✓";color:#fff;font-size:13px;}
.plant-detail{display:none;border-top:1px solid var(--border);}
.plant-detail.open{display:block;}
.plant-photo{width:100%;max-height:220px;object-fit:cover;display:block;}
.plant-note{font-size:12.5px;font-style:italic;color:var(--muted);padding:.6rem .9rem .5rem;line-height:1.6;}
.tag{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:.1rem .4rem;border-radius:4px;margin:.15rem .2rem .15rem 0;background:rgba(200,148,58,0.10);color:var(--gold);border:1px solid rgba(200,148,58,0.2);}
.tag.warn{background:rgba(180,60,30,0.08);color:#b43c1e;border-color:rgba(180,60,30,0.15);}
.tags{padding:0 .9rem .5rem;}
.diagnose-section{padding:.5rem .9rem .8rem;border-top:1px solid var(--border);}
.diagnose-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;}
.upload-btn{display:flex;align-items:center;gap:.5rem;background:transparent;border:1.5px dashed var(--border);color:var(--muted);border-radius:10px;padding:.5rem .8rem;font-size:13px;font-family:"Cormorant Garamond",serif;cursor:pointer;width:100%;justify-content:center;}
.upload-input{display:none;}
.preview-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin:.4rem 0;display:none;}
.diag-result{background:rgba(122,154,90,0.07);border-left:2px solid var(--sage);border-radius:0 8px 8px 0;padding:.5rem .7rem;font-size:13px;font-style:italic;color:var(--text);line-height:1.6;margin-top:.4rem;display:none;}
.diag-result.error{border-left-color:#b43c1e;background:rgba(180,60,30,0.05);color:#b43c1e;}
.diag-btn{margin-top:.4rem;background:var(--gold);color:#fff;border:none;border-radius:20px;padding:.35rem .9rem;font-size:13px;font-family:"Cormorant Garamond",serif;cursor:pointer;display:none;}
.plant-care-badge{font-size:11px;color:var(--sage);margin-top:.1rem;font-style:italic;}

/* Care panel */
.care-toggle{font-size:12px;letter-spacing:.05em;color:var(--gold);padding:.55rem .9rem;cursor:pointer;border-top:1px solid var(--border);background:rgba(200,148,58,0.04);display:flex;align-items:center;gap:.4rem;}
.care-badge-inline{background:rgba(192,57,43,0.12);color:var(--due);border-radius:8px;padding:.05rem .4rem;font-size:10px;margin-left:.3rem;}
.care-panel{display:none;}
.care-panel.open{display:block;}
.care-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .9rem .55rem;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
.care-row:active{background:rgba(200,148,58,0.05);}
.care-row.care-due{background:rgba(192,57,43,0.04);}
.care-row.care-done{opacity:.45;}
.care-icon{font-size:1.1rem;flex-shrink:0;margin-top:.1rem;}
.care-info{flex:1;min-width:0;}
.care-label{font-family:"Playfair Display",serif;font-size:.9rem;font-style:italic;color:var(--text);}
.care-row.care-done .care-label{text-decoration:line-through;text-decoration-color:var(--gold-light);}
.care-season{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-top:.1rem;}
.care-status{font-size:11px;margin-top:.1rem;font-style:italic;}
.care-status-due{color:var(--due);}
.care-status-ok{color:var(--sage);}
.care-note{font-size:12px;font-style:italic;color:var(--muted);margin-top:.25rem;line-height:1.5;}
.care-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;margin-top:.15rem;display:flex;align-items:center;justify-content:center;}
.care-checked{background:var(--sage);border-color:var(--sage);}
.care-checked::after{content:"✓";color:#fff;font-size:11px;}

.reset{position:fixed;bottom:1.2rem;right:1.2rem;background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:30px;padding:.4rem 1rem;font-size:13px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
</style>
</head>

  {img:'weihnachtskaktus',icon:'🎄',name:'Weihnachtskaktus',latin:'Schlumbergera truncata',
   days:9,freq:'alle 7–10 Tage',
   note:'Nach der Blüte: kühler und trockener halten (12–15°C). Keine direkte Mittagssonne.',
   tags:['indirektes Licht','Blühpause einhalten'],
   care:[
     {icon:'🌱',label:'Düngen',days:28,season:'März–Sept',note:'Alle 4 Wochen mit Flüssigdünger. Nach der Blüte 2 Monate pausieren.'},
     {icon:'🪴',label:'Umtopfen',days:1095,season:'nach der Blüte',note:'Alle 3–4 Jahre. Mag leicht saure Erde — Orchideen- oder Azaleenerde eignet sich gut.'},
     {icon:'🌑',label:'Knospen anregen',days:null,season:'Sep–Okt',note:'2–3 Wochen kühle Nächte (unter 15°C) UND 14h Dunkelheit täglich — weg vom Kunstlicht. Dann zurück in die Wärme: Knospen erscheinen.'},
     {icon:'✂️',label:'Stecklinge',days:null,season:'Frühjahr',note:'2–3 Glieder abdrehen (nicht schneiden), 1 Woche trocknen lassen, dann in feuchte Erde stecken. Sehr einfach zu vermehren!'},
   ]},
];

var watered={};
var openState={};
var careState={};
var careOpen={};
var fileData={};

try{
  var stored=JSON.parse(localStorage.getItem('pflanzen_v6')||'{}');
  watered=stored.watered||{};
  careState=stored.care||{};
}catch(e){}

function save(){
  try{localStorage.setItem('pflanzen_v6',JSON.stringify({watered:watered,care:careState}));}catch(e){}
}

function daysSince(i){
  if(!watered[i]) return null;
  return Math.floor((Date.now()-watered[i])/86400000);
}
function isDue(i){
  var p=PLANTS[i]; if(!p.days) return false;
  var ds=daysSince(i); return ds===null||ds>=p.days;
}
function isDone(i){
  var p=PLANTS[i]; var ds=daysSince(i);
  if(ds===null) return false;
  if(!p.days) return ds===0;
  return ds<p.days;
}
function careDay(i,j){
  if(!careState[i]||!careState[i][j]) return null;
  return Math.floor((Date.now()-careState[i][j])/86400000);
}
function careDue(i,j){
  var c=PLANTS[i].care[j]; if(!c.days) return false;
  var ds=careDay(i,j); return ds===null||ds>=c.days;
}
function careDone(i,j){
  var c=PLANTS[i].care[j]; var ds=careDay(i,j);
  if(ds===null) return false;
  if(!c.days) return ds===0;
  return ds<c.days;
}

function render(){
  var dueCount=PLANTS.filter(function(p,i){return isDue(i);}).length;
  var doneCount=PLANTS.filter(function(p,i){return isDone(i);}).length;
  var cEl=document.getElementById('counter');
  if(dueCount>0){
    cEl.innerHTML='<span class="due-count">⚡ '+dueCount+' fällig</span> · '+doneCount+' versorgt';
  } else {
    cEl.textContent='✓ Alle versorgt · '+doneCount+' gegossen';
  }
  var h='';
  PLANTS.forEach(function(p,i){
    var due=isDue(i); var done=isDone(i);
    var isOpen=!!openState[i]; var isCareOpen=!!careOpen[i];
    var ds=daysSince(i);
    var tagsHtml='';
    if(p.tags){p.tags.forEach(function(t){
      var warn=t.indexOf('⚠')>=0||t.indexOf('giftig')>=0||t.indexOf('umtopfen')>=0;
      tagsHtml+='<span class="tag'+(warn?' warn':'')+'">'+t+'</span>';
    });}
    var careDueCount=0;
    if(p.care){p.care.forEach(function(c,j){if(careDue(i,j))careDueCount++;});}

    var cls='plant'+(done?' done':'')+(due&&!done?' due':'');
    h+='<div class="'+cls+'" id="p'+i+'">';
    h+='<div class="plant-top" onclick="toggleDetail('+i+')">';
    h+='<span class="plant-icon">'+p.icon+'</span>';
    h+='<div class="plant-info">';
    h+='<div class="plant-name">'+p.name+'</div>';
    h+='<div class="plant-latin">'+p.latin+'</div>';
    h+='<div class="plant-freq">💧 '+p.freq+'</div>';
    if(p.days){
      if(due&&!done){
        var st=ds===null?'noch nie gegossen':'seit '+ds+' Tag'+(ds!==1?'en':'');
        h+='<div class="plant-due-badge">⚡ fällig — '+st+'</div>';
      } else if(done){
        var left=p.days-ds;
        h+='<div class="plant-ok-badge">✓ in '+left+' '+(left===1?'Tag':'Tagen')+' wieder</div>';
      }
    }
    if(careDueCount>0){
      h+='<div class="plant-care-badge">🌿 '+careDueCount+' Pflege'+(careDueCount>1?'maßnahmen':'maßnahme')+' fällig</div>';
    }
    h+='</div>';
    h+='<div class="plant-check" onclick="event.stopPropagation();toggleDone('+i+')"></div>';
    h+='</div>';

    h+='<div class="plant-detail'+(isOpen?' open':'')+'" id="detail'+i+'">';
    h+='<img class="plant-photo" src="'+IMGS[p.img]+'" alt="'+p.name+'">';
    h+='<div class="plant-note">'+p.note+'</div>';
    if(tagsHtml)h+='<div class="tags">'+tagsHtml+'</div>';

    if(p.care&&p.care.length){
      var careLabel=isCareOpen?'▲ Pflege &amp; Jahreszeiten':'▼ Pflege &amp; Jahreszeiten';
      if(careDueCount>0)careLabel+=' <span class="care-badge-inline">'+careDueCount+' fällig</span>';
      h+='<div class="care-toggle" onclick="toggleCare('+i+')">'+careLabel+'</div>';
      h+='<div class="care-panel'+(isCareOpen?' open':'')+'" id="care'+i+'">';
      p.care.forEach(function(c,j){
        var cd=careDone(i,j); var cdue=careDue(i,j);
        var cds=careDay(i,j);
        var rowCls='care-row'+(cd?' care-done':'')+(cdue&&!cd?' care-due':'');
        h+='<div class="'+rowCls+'" onclick="toggleCareDone('+i+','+j+')">';
        h+='<span class="care-icon">'+c.icon+'</span>';
        h+='<div class="care-info">';
        h+='<div class="care-label">'+c.label+'</div>';
        h+='<div class="care-season">'+c.season+'</div>';
        if(c.days){
          if(cdue&&!cd){
            var cst=cds===null?'noch nie gemacht':'seit '+cds+' Tag'+(cds!==1?'en':'');
            h+='<div class="care-status care-status-due">⚡ fällig — '+cst+'</div>';
          } else if(cd){
            var cleft=c.days-cds;
            h+='<div class="care-status care-status-ok">✓ in '+cleft+' '+(cleft===1?'Tag':'Tagen')+'</div>';
          }
        }
        h+='<div class="care-note">'+c.note+'</div>';
        h+='</div>';
        h+='<div class="care-check'+(cd?' care-checked':'')+'"></div>';
        h+='</div>';
      });
      h+='</div>';
    }

    h+='<div class="diagnose-section">';
    h+='<div class="diagnose-label">🔍 KI-Diagnose</div>';
    h+='<input type="file" accept="image/*" capture="environment" class="upload-input" id="file'+i+'" onchange="previewFile('+i+')">';
    h+='<img class="preview-img" id="preview'+i+'">';
    h+='<button class="upload-btn" onclick="triggerFile('+i+')">📷 Aktuelles Foto hochladen</button>';
    h+='<button class="diag-btn" id="diagbtn'+i+'" onclick="diagnose('+i+')">Analysieren</button>';
    h+='<div class="diag-result" id="diagresult'+i+'"></div>';
    h+='</div></div></div>';
  });
  document.getElementById('list').innerHTML=h;
}

function toggleDetail(i){openState[i]=!openState[i];var el=document.getElementById('detail'+i);if(el)el.className='plant-detail'+(openState[i]?' open':'');}
function toggleCare(i){careOpen[i]=!careOpen[i];render();}
function toggleDone(i){if(isDone(i)){delete watered[i];}else{watered[i]=Date.now();}save();render();}
function toggleCareDone(i,j){if(!careState[i])careState[i]={};if(careDone(i,j)){delete careState[i][j];}else{careState[i][j]=Date.now();}save();render();}
function resetAll(){watered={};careState={};save();render();}
function triggerFile(i){var el=document.getElementById('file'+i);if(el)el.click();}
function previewFile(i){
  var input=document.getElementById('file'+i);
  if(!input||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    fileData[i]=e.target.result;
    var preview=document.getElementById('preview'+i);
    if(preview){preview.src=e.target.result;preview.style.display='block';}
    var btn=document.getElementById('diagbtn'+i);
    if(btn)btn.style.display='block';
  };
  reader.readAsDataURL(input.files[0]);
}
function diagnose(i){
  var p=PLANTS[i]; var data=fileData[i]; if(!data)return;
  var btn=document.getElementById('diagbtn'+i);
  var result=document.getElementById('diagresult'+i);
  btn.textContent='Analysiere …'; btn.disabled=true; result.style.display='none';
  var base64=data.split(',')[1]; var mediaType=data.split(';')[0].split(':')[1];
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:'Du bist eine achtsame Pflanzenpflegerin. Antworte auf Deutsch, warm und praktisch, in 4–5 Sätzen fließendem Text. Keine Listen.',
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:'Das ist meine '+p.name+' ('+p.latin+'). Wie geht es ihr auf dem Foto? Was ist als nächstes zu tun?'}
      ]}]})
  }).then(function(r){return r.json();}).then(function(d){
    var text=d.content&&d.content[0]&&d.content[0].text;
    result.textContent=text||'Keine Antwort erhalten.';
    result.className='diag-result'+(text?'':' error');
    result.style.display='block'; btn.textContent='Nochmal analysieren'; btn.disabled=false;
  }).catch(function(err){
    result.textContent='Fehler: '+err.message;
    result.className='diag-result error'; result.style.display='block';
    btn.textContent='Nochmal analysieren'; btn.disabled=false;
  });
}
render();

</script>
</body>
</html>
