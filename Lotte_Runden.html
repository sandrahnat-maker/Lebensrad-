<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<title>Lottes Runden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@keyframes wimpel-swing{0%,100%{transform:rotate(-4deg) skewX(2deg);}50%{transform:rotate(4deg) skewX(-2deg);}}
@keyframes wimpel-swing2{0%,100%{transform:rotate(3deg) skewX(-1deg);}50%{transform:rotate(-3deg) skewX(1deg);}}
@keyframes wimpel-swing3{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(5deg);}}
@keyframes rope-sway{0%,100%{transform:scaleX(1);}50%{transform:scaleX(1.008);}}
@keyframes tier-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes spotlight{0%{left:-100%;}60%,100%{left:220%;}}
:root{--bg:#fdf6ee;--card:#fffbf5;--text:#1e1208;--muted:rgba(30,18,8,0.45);--crimson:#b8294a;--crimson-l:rgba(184,41,74,0.10);--gold:#c9893a;--gold-l:rgba(201,137,58,0.13);--navy:#1a2744;--sage:#5e8a5a;--sage-l:rgba(94,138,90,0.12);--violet:#6a3f7a;--border:rgba(184,41,74,0.13);--shadow:rgba(30,18,8,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{background:var(--bg);font-family:"Raleway",sans-serif;color:var(--text);min-height:100vh;padding-bottom:4rem;background-image:repeating-linear-gradient(-6deg,rgba(184,41,74,0.022) 0px,rgba(184,41,74,0.022) 28px,transparent 28px,transparent 56px,rgba(201,137,58,0.018) 56px,rgba(201,137,58,0.018) 84px,transparent 84px,transparent 112px);}
.wimpelkette{position:relative;width:100%;height:40px;overflow:hidden;display:block;background:var(--bg);}
.wimpelkette svg{width:100%;height:40px;overflow:visible;animation:rope-sway 5s ease-in-out infinite;}
.wimpel-1{animation:wimpel-swing 2.8s ease-in-out infinite;}
.wimpel-2{animation:wimpel-swing2 3.2s ease-in-out infinite 0.3s;}
.wimpel-3{animation:wimpel-swing3 2.5s ease-in-out infinite 0.6s;}
.wimpel-4{animation:wimpel-swing 3.0s ease-in-out infinite 0.9s;}
.wimpel-5{animation:wimpel-swing2 2.7s ease-in-out infinite 1.2s;}
.wimpel-6{animation:wimpel-swing3 3.4s ease-in-out infinite 1.5s;}
.wimpel-7{animation:wimpel-swing 2.9s ease-in-out infinite 1.8s;}
.wimpel-8{animation:wimpel-swing2 2.6s ease-in-out infinite 2.1s;}
.wimpel-9{animation:wimpel-swing3 3.1s ease-in-out infinite 2.4s;}
.zirkus-header{padding:0.8rem 1.2rem 0.85rem;border-bottom:2px solid var(--border);background:rgba(255,251,245,0.92);}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--crimson);text-decoration:none;opacity:.7;margin-bottom:.4rem;background:none;border:none;cursor:pointer;padding:0;}
.back-btn:active{opacity:1;}
.header-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;font-weight:500;}
.header-title{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;color:var(--text);line-height:1.2;}
.header-sub{font-family:"IM Fell English",serif;font-size:14px;font-style:italic;color:var(--muted);margin-top:.15rem;}
.rainbow-stripe{height:5px;background:repeating-linear-gradient(90deg,var(--crimson) 0%,var(--crimson) 20%,var(--gold) 20%,var(--gold) 40%,var(--navy) 40%,var(--navy) 60%,var(--violet) 60%,var(--violet) 80%,var(--sage) 80%,var(--sage) 100%);opacity:.6;margin-bottom:.2rem;}

body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#b8294a 0,#b8294a 20%,#c9893a 20%,#c9893a 40%,#1a2744 40%,#1a2744 60%,#6a3f7a 60%,#6a3f7a 80%,#5e8a5a 80%,#5e8a5a 100%);z-index:100;opacity:.7;}
</style>
<style>
header{background:rgba(255,251,245,.95);border-bottom:1px solid var(--border-col);padding:.9rem 1.2rem .8rem;text-align:center;}
.ht{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;color:var(--text);}
.hs{font-size:13px;color:var(--muted);font-style:italic;margin-top:.2rem;}

/* TODAY CARD */
.today-card{margin:1rem;background:var(--white);border-radius:16px;padding:1.2rem 1.1rem;border:1px solid var(--border);box-shadow:0 3px 14px rgba(180,120,40,0.09);}
.today-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);margin-bottom:.4rem;}
.today-day{font-family:"Playfair Display",serif;font-size:20px;font-style:italic;color:var(--text);margin-bottom:.5rem;}
.today-route{font-size:15px;line-height:1.9;color:var(--text);margin-bottom:1rem;}
.arrow{color:var(--gold);margin:0 .2rem;}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;}
.btn-maps{background:var(--gold);color:#fff;border:none;border-radius:30px;padding:.5rem 1.1rem;font-size:15px;font-family:"Cormorant Garamond",serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.btn-osm{background:var(--sage);color:#fff;border:none;border-radius:30px;padding:.5rem 1.1rem;font-size:15px;font-family:"Cormorant Garamond",serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.btn-speak{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:30px;padding:.5rem 1rem;font-size:15px;font-family:"Cormorant Garamond",serif;cursor:pointer;}

/* DAY CARDS */
.days{display:flex;flex-direction:column;gap:.7rem;padding:0 1rem;}
.day-card{background:var(--white);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
.day-card.is-today{border-color:var(--gold);box-shadow:0 3px 14px rgba(180,120,40,0.12);}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer;}
.day-left{display:flex;align-items:center;gap:.6rem;}
.day-name{font-family:"Playfair Display",serif;font-style:italic;font-weight:400;font-size:17px;}
.day-tag{font-size:12px;background:var(--bg);color:var(--muted);border-radius:20px;padding:.1rem .5rem;}
.is-today .day-tag{background:var(--gold);color:#fff;}
.day-dur{font-size:12px;color:var(--muted);}
.chev{color:var(--muted);font-size:12px;transition:transform .2s;}
.day-card.open .chev{transform:rotate(180deg);}
.day-
.day-card.open .day-
.route-txt{font-size:15px;line-height:1.9;color:var(--text);margin-bottom:.75rem;}
.route-note{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:.75rem;line-height:1.6;}
.btn-row-s{display:flex;gap:.5rem;flex-wrap:wrap;}
.bms{background:var(--gold);color:#fff;border:none;border-radius:20px;padding:.38rem .9rem;font-size:14px;font-family:"Cormorant Garamond",serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;}
.bos{background:var(--sage);color:#fff;border:none;border-radius:20px;padding:.38rem .9rem;font-size:14px;font-family:"Cormorant Garamond",serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;}
.bsp{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);border-radius:20px;padding:.38rem .9rem;font-size:14px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
</style>
</head>
<body>
<div class="wimpelkette" aria-hidden="true"><svg viewBox="0 0 400 44" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,7 Q50,11 100,9 Q150,7 200,10 Q250,13 300,9 Q350,7 400,9" stroke="#1a2744" stroke-width="1" fill="none" opacity="0.3"/><g class="wimpel-1" transform-origin="30 9"><polygon points="23,9 37,9 30,28" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-2" transform-origin="67 9"><polygon points="60,9 74,9 67,28" fill="#c9893a" opacity="0.8"/></g><g class="wimpel-3" transform-origin="104 9"><polygon points="97,9 111,9 104,28" fill="#1a2744" opacity="0.75"/></g><g class="wimpel-4" transform-origin="141 9"><polygon points="134,9 148,9 141,28" fill="#6a3f7a" opacity="0.75"/></g><g class="wimpel-5" transform-origin="178 10"><polygon points="171,10 185,10 178,29" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-6" transform-origin="215 9"><polygon points="208,9 222,9 215,28" fill="#5e8a5a" opacity="0.7"/></g><g class="wimpel-7" transform-origin="252 10"><polygon points="245,10 259,10 252,29" fill="#c9893a" opacity="0.8"/></g><g class="wimpel-8" transform-origin="289 9"><polygon points="282,9 296,9 289,28" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-9" transform-origin="326 9"><polygon points="319,9 333,9 326,28" fill="#1a2744" opacity="0.75"/></g><g class="wimpel-1" transform-origin="363 9"><polygon points="356,9 370,9 363,28" fill="#6a3f7a" opacity="0.75"/></g></svg></div>
<div class="zirkus-header">
<a class="back-btn" href="index.html">‹ zurück zu Mein Leben</a>
<div class="rainbow-stripe"></div>
<div class="header-eyebrow">Tiere</div>
<div class="header-title">Lottes Runden</div>
<div class="header-sub">Spaziergänge im 5. & 6. Bezirk</div>
</div>



<div class="today-card" id="todayCard">
  <div class="today-lbl">Heute</div>
  <div class="today-day" id="todayDay"></div>
  <div class="today-route" id="todayRoute"></div>
  <div class="btn-row">
    <a class="btn-maps" id="todayMaps" href="#" target="_blank">&#128205; Google Maps</a>
    <a class="btn-osm" id="todayOsm" href="#" target="_blank">&#127807; OsmAnd</a>
    <button class="btn-speak" id="btnSpeak" onclick="speak()">&#128266; Vorlesen</button>
  </div>
</div>

<div class="days" id="daysList"></div>

<script>
var DAYS_DE = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

// Basis-URL der GPX-Dateien auf GitHub (raw)
var GPX_BASE = "https://raw.githubusercontent.com/sandrahnat-maker/Fokus/main/gpx/";

var ROUTES = [
  {
    day:"Montag",
    dur:"ca. 30 Min.",
    name:"Bacherpark-Runde",
    stops:["Magdalenenstra&#223;e 4","Mittelgasse","Reinprechtsdorfer Stra&#223;e","Bacherpark","Ramperstorffergasse","Siebenbrunnenfeldgasse","Arbeitergasse","Magdalenenstra&#223;e 4"],
    note:"Ruhige Wohngassen im Herzen des 5. Bezirks. Der Bacherpark ist hundefreundlich und hat schattige Wege.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Bacherpark,+Wien+1050",
    gpx:"lotte_montag_bacherpark.gpx"
  },
  {
    day:"Dienstag",
    dur:"ca. 30 Min.",
    name:"Margaretenplatz-Runde",
    stops:["Magdalenenstra&#223;e 4","Stiegengasse","Pilgramgasse","Margaretenplatz","Hofgasse","Schlossgasse","Zentagasse","Magdalenenstra&#223;e 4"],
    note:"Sehr ruhige Biedermeier-Gassen rund um den Margaretenplatz. Kaum Verkehr, viel Altbau-Charme.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Margaretenplatz,+Wien+1050",
    gpx:"lotte_dienstag_margaretenplatz.gpx"
  },
  {
    day:"Mittwoch",
    dur:"ca. 30 Min.",
    name:"Siebenbrunnen-Runde",
    stops:["Magdalenenstra&#223;e 4","Hamburgerstra&#223;e","Siebenbrunnengasse","Siebenbrunnenplatz","Einsiedlergasse","Laurenzgasse","Magdalenenstra&#223;e 4"],
    note:"Sch&#246;ne ruhige Gassen Richtung S&#252;den. Der Siebenbrunnenplatz hat B&#228;ume und eine angenehme Atmosph&#228;re.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Siebenbrunnenplatz,+Wien+1050",
    gpx:"lotte_mittwoch_siebenbrunnen.gpx"
  },
  {
    day:"Donnerstag",
    dur:"ca. 30 Min.",
    name:"Zentagasse-Runde",
    stops:["Magdalenenstra&#223;e 4","Stiegengasse","Zentagasse","Grohgasse","Margaretenstra&#223;e","Ramperstorffergasse","Bacherpark","Magdalenenstra&#223;e 4"],
    note:"Eine entspannte Runde durch die s&#252;dlichen Nebenstra&#223;en. Kaum Autos, breite Gehsteige.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Zentagasse,+Wien+1050",
    gpx:"lotte_donnerstag_zentagasse.gpx"
  },
  {
    day:"Freitag",
    dur:"ca. 35 Min.",
    name:"Wienfluss-Runde",
    stops:["Magdalenenstra&#223;e 4","Steggasse","Rechte Wienzeile","Wienfluss-Promenade","Kettenbr&#252;ckengasse","Nikolsdorfer Gasse","Magdalenenstra&#223;e 4"],
    note:"Entlang des Wienflusses gibt es eine sch&#246;ne gr&#252;ne Promenade. Besonders am Morgen sehr ruhig.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Rechte+Wienzeile+Wien",
    gpx:"lotte_freitag_wienfluss.gpx"
  },
  {
    day:"Samstag",
    dur:"ca. 35 Min.",
    name:"Naschmarkt-Runde",
    stops:["Magdalenenstra&#223;e 4","Schleifm&#252;hlgasse","Naschmarkt (Promenade)","Linke Wienzeile","Pilgramgasse","Hamburgerstra&#223;e","Magdalenenstra&#223;e 4"],
    note:"Die Naschmarkt-Promenade ist am fr&#252;hen Samstag-Morgen wunderbar ruhig. Viel Gr&#252;n entlang des Weges.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Naschmarkt+Wien",
    gpx:"lotte_samstag_naschmarkt.gpx"
  },
  {
    day:"Sonntag",
    dur:"ca. 40 Min.",
    name:"Gro&#223;e Sonntagsrunde",
    stops:["Magdalenenstra&#223;e 4","Stiegengasse","Bacherpark","Reinprechtsdorfer Stra&#223;e","Siebenbrunnengasse","Siebenbrunnenplatz","Einsiedlergasse","Margaretenstra&#223;e","Pilgramgasse","Magdalenenstra&#223;e 4"],
    note:"Die sch&#246;nste Runde f&#252;r den Sonntag &#8212; etwas l&#228;nger, durch die ruhigsten Gassen des 5. Bezirks.",
    maps:"https://maps.google.com/?saddr=Magdalenenstrase+4,+Wien&daddr=Siebenbrunnenplatz+Wien+1050",
    gpx:"lotte_sonntag_gross.gpx"
  }
];

// Map Mon=0..Sun=6 to ROUTES index (Mon=0)
var DAY_MAP = {1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 0:6};

function osmUrl(route) {
  // OsmAnd öffnet GPX-Track direkt via osmand.net/go
  var gpxUrl = encodeURIComponent(GPX_BASE + route.gpx);
  return "https://osmand.net/go?url=" + gpxUrl;
}

function stopsHtml(stops, arrowClass) {
  return stops.map(function(s){ return s; }).join('<span class="'+arrowClass+'"> &#8250; </span>');
}

function speak() {
  var today = new Date();
  var idx = DAY_MAP[today.getDay()];
  var r = ROUTES[idx];
  var txt = "Lottes Runde heute: " + r.name + ". Route: " + r.stops.join(", dann ");
  var u = new SpeechSynthesisUtterance(txt);
  u.lang = "de-AT"; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function render() {
  var today = new Date();
  var todayIdx = DAY_MAP[today.getDay()];
  var r = ROUTES[todayIdx];

  document.getElementById("todayDay").innerHTML = r.name + ' <span style="font-size:14px;color:var(--muted);font-style:normal;">&#8212; ' + r.day + '</span>';
  document.getElementById("todayRoute").innerHTML = stopsHtml(r.stops, "arrow");
  document.getElementById("todayMaps").href = r.maps;
  document.getElementById("todayOsm").href = osmUrl(r);

  var daysList = document.getElementById("daysList");
  daysList.innerHTML = "";

  ROUTES.forEach(function(route, idx) {
    var isToday = (idx === todayIdx);
    var card = document.createElement("div");
    card.className = "day-card" + (isToday ? " is-today" : "");

    var hdr = document.createElement("div"); hdr.className = "day-hdr";
    var left = document.createElement("div"); left.className = "day-left";
    var nm = document.createElement("div"); nm.className = "day-name"; nm.textContent = route.day;
    var tag = document.createElement("div"); tag.className = "day-tag";
    tag.textContent = isToday ? "Heute" : route.name;
    var dur = document.createElement("div"); dur.className = "day-dur"; dur.textContent = route.dur;
    var chev = document.createElement("span"); chev.className = "chev"; chev.textContent = "v";

    left.appendChild(nm); left.appendChild(tag);
    hdr.appendChild(left); hdr.appendChild(dur); hdr.appendChild(chev);
    card.appendChild(hdr);

    var body = document.createElement("div"); body.className = "day-body";
    var rtxt = document.createElement("div"); rtxt.className = "route-txt";
    rtxt.innerHTML = stopsHtml(route.stops, "arrow");
    var rnote = document.createElement("div"); rnote.className = "route-note";
    rnote.innerHTML = route.note;
    var btnRow = document.createElement("div"); btnRow.className = "btn-row-s";
    var bm = document.createElement("a"); bm.className = "bms"; bm.href = route.maps;
    bm.target = "_blank"; bm.innerHTML = "&#128205; Maps";
    var bo = document.createElement("a"); bo.className = "bos"; bo.href = osmUrl(route);
    bo.innerHTML = "&#127807; OsmAnd";
    var bsp = document.createElement("button"); bsp.className = "bsp";
    bsp.innerHTML = "&#128266; Vorlesen";
    (function(ro){ bsp.addEventListener("click", function(){
      var txt = "Runde: " + ro.name + ". " + ro.stops.join(", dann ");
      var u = new SpeechSynthesisUtterance(txt);
      u.lang = "de-AT"; u.rate = 0.9;
      window.speechSynthesis.speak(u);
    }); })(route);
    btnRow.appendChild(bm); btnRow.appendChild(bo); btnRow.appendChild(bsp);
    body.appendChild(rtxt); body.appendChild(rnote); body.appendChild(btnRow);
    card.appendChild(body);

    hdr.addEventListener("click", function(){
      card.classList.toggle("open");
    });

    if (isToday) card.classList.add("open");
    daysList.appendChild(card);
  });
}

render();
</script>
</body>
</html>
