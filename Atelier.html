<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf8ee">
<title>Mein Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf8ee;
  --card: #fffdf5;
  --ink: #2a1a08;
  --muted: rgba(42,26,8,0.45);
  --border: rgba(192,57,43,0.13);
  --shadow: rgba(42,26,8,0.08);

  /* Raum-Farben */
  --r1: #c0392b; /* Spiritualität — Karmin */
  --r2: #4a7c59; /* Beruf — Waldgrün */
  --r3: #c8993a; /* Beziehungen — Gold */
  --r4: #b05a2a; /* Körper — Terrakotta */
  --r5: #6b4f8a; /* Persönlichkeit — Pflaume */
  --r6: #3a6a8a; /* Finanzen — Stahlblau */
  --r7: #7a9e5a; /* Freizeit — Salbei */
  --r8: #a0522d; /* Familie & Tiere — Sienna */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Raleway', sans-serif;
  overflow-x: hidden;
  padding-bottom: 5rem;
}

/* paper texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    repeating-linear-gradient(170deg, rgba(245,233,200,.3) 0, rgba(245,233,200,.3) 18px, transparent 18px, transparent 36px),
    radial-gradient(ellipse at 10% 15%, rgba(192,57,43,.05) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 80%, rgba(74,124,89,.04) 0%, transparent 40%);
}

body > * { position: relative; z-index: 1; }

/* ── header ── */
header {
  background: rgba(255,253,245,.93);
  border-bottom: 1px solid var(--border);
  padding: .9rem 1.2rem .7rem;
  backdrop-filter: blur(4px);
}
header::before {
  content: '🌺 · 🌿 · 🌾 · 🌸 · 🎨 · 🌿 · 🌾 · 🌺 · 🌸 · 🎨 · 🌺';
  display: block; font-size: 7px; letter-spacing: .3em;
  color: var(--r1); opacity: .3; text-align: center; margin-bottom: .4rem;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.back-btn {
  font-family: 'Caveat', cursive; font-size: .95rem;
  color: var(--muted); background: none; border: none; cursor: pointer;
  padding: .1rem .3rem;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-style: italic; color: var(--ink);
}
.header-date {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: .8rem; color: var(--muted); margin-top: .15rem; text-align: center;
}

/* ── morning question ── */
.morgen-frage {
  margin: 1rem 1rem .2rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: .9rem 1.1rem;
  box-shadow: 0 2px 12px var(--shadow);
  position: relative;
  overflow: hidden;
}
.morgen-frage::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--r1), var(--r3), var(--r2), var(--r7));
}
.morgen-frage-label {
  font-family: 'Raleway', sans-serif; font-size: .6rem;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--r1); font-weight: 700; margin-bottom: .3rem;
}
.morgen-frage-text {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 1rem; color: var(--ink); line-height: 1.5;
}

/* ── raum grid ── */
.atelier-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .7rem;
  padding: .8rem 1rem;
}

.raum-karte {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: .9rem .9rem .8rem;
  box-shadow: 0 2px 10px var(--shadow);
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.4,.64,1), box-shadow .18s;
  position: relative;
  overflow: hidden;
  min-height: 110px;
  display: flex; flex-direction: column;
}
.raum-karte:active { transform: scale(.97); box-shadow: 0 1px 4px var(--shadow); }
.raum-karte.offen {
  transform: scale(1.02);
  box-shadow: 0 6px 24px rgba(42,26,8,.14);
}

/* color accent top bar */
.raum-karte::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  border-radius: 18px 18px 0 0;
}

/* paper fold corner */
.raum-karte::after {
  content: '';
  position: absolute; bottom: 0; right: 0;
  width: 22px; height: 22px;
  background: linear-gradient(225deg, var(--bg) 50%, transparent 50%);
  opacity: .6;
}

.raum-emoji { font-size: 1.6rem; margin-bottom: .3rem; line-height: 1; }
.raum-name {
  font-family: 'Caveat', cursive; font-size: 1.05rem; font-weight: 700;
  line-height: 1.2; flex: 1;
}
.raum-status {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: .75rem; margin-top: .3rem; opacity: .6;
}
.raum-stimmung-dots {
  display: flex; gap: 3px; margin-top: .4rem;
}
.raum-dot {
  width: 7px; height: 7px; border-radius: 50%;
  border: 1px solid currentColor; opacity: .3;
  transition: opacity .2s;
}
.raum-dot.aktiv { opacity: 1; }

/* ── atelier overlay (Raum betreten) ── */
.raum-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(253,248,238,.97);
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.raum-overlay.offen { display: flex; }

.raum-overlay-header {
  padding: 1rem 1.2rem .8rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(255,253,245,.95);
  backdrop-filter: blur(4px);
  z-index: 10;
  display: flex; align-items: center; gap: .8rem;
}
.raum-overlay-back {
  font-family: 'Caveat', cursive; font-size: 1.1rem;
  color: var(--muted); background: none; border: none; cursor: pointer;
}
.raum-overlay-title {
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 1.3rem; flex: 1;
}
.raum-overlay-emoji { font-size: 2rem; }

.raum-overlay-body { padding: 1rem 1.2rem; flex: 1; }

/* stimmungs-wahl */
.stimmung-section { margin-bottom: 1.2rem; }
.section-label {
  font-family: 'Raleway', sans-serif; font-size: .6rem;
  letter-spacing: .18em; text-transform: uppercase; font-weight: 700;
  color: var(--muted); margin-bottom: .5rem;
}
.stimmung-optionen {
  display: flex; gap: .5rem; flex-wrap: wrap;
}
.stimmung-btn {
  font-family: 'Caveat', cursive; font-size: .95rem;
  padding: .3rem .75rem; border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg); color: var(--ink);
  cursor: pointer; transition: all .15s;
}
.stimmung-btn.aktiv {
  color: white; border-color: transparent;
}

/* frage */
.frage-section { margin-bottom: 1rem; }
.atelier-frage {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: 1.05rem; color: var(--ink); line-height: 1.55;
  margin-bottom: .6rem;
}
.atelier-textarea {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 12px; padding: .6rem .8rem;
  font-family: 'Caveat', cursive; font-size: 1.05rem;
  background: var(--card); resize: none;
  min-height: 90px; outline: none; color: var(--ink);
  line-height: 1.5;
}
.atelier-textarea:focus { border-color: var(--current-color, #c0392b); }

/* aufgabe hinzufügen */
.aufgabe-section { margin-bottom: 1.2rem; }
.aufgabe-input-row { display: flex; gap: .5rem; }
.aufgabe-inp {
  flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: .45rem .7rem; font-family: 'Caveat', cursive; font-size: 1rem;
  background: var(--bg); outline: none; color: var(--ink);
}
.aufgabe-inp:focus { border-color: var(--current-color, #c0392b); }
.aufgabe-phase-sel {
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: .45rem .5rem; font-family: 'Raleway', sans-serif; font-size: .75rem;
  background: var(--bg); color: var(--ink); outline: none;
}
.aufgabe-add-btn {
  color: white; border: none; border-radius: 10px;
  padding: .45rem .9rem; font-family: 'Raleway', sans-serif;
  font-weight: 700; font-size: .8rem; cursor: pointer;
  white-space: nowrap;
}

/* vergangene einträge */
.eintraege-section { margin-top: .5rem; }
.eintrag-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: .65rem .8rem; margin-bottom: .4rem;
}
.eintrag-datum {
  font-family: 'Raleway', sans-serif; font-size: .65rem;
  letter-spacing: .06em; opacity: .45; margin-bottom: .2rem;
}
.eintrag-stimmung {
  font-size: .75rem; margin-bottom: .2rem;
}
.eintrag-text {
  font-family: 'Caveat', cursive; font-size: .95rem;
  line-height: 1.45; color: var(--ink);
}

/* save row */
.raum-save-row {
  display: flex; gap: .5rem; align-items: center; margin-top: .8rem;
}
.raum-save-btn {
  color: white; border: none; border-radius: 20px;
  padding: .45rem 1.2rem; font-family: 'Raleway', sans-serif;
  font-weight: 700; font-size: .85rem; cursor: pointer;
}
.raum-gespeichert {
  font-family: 'Caveat', cursive; font-size: .9rem;
  color: var(--r7); display: none;
}

/* ── abend-reflexion ── */
.abend-wrap {
  margin: 0 1rem 1rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: .9rem 1.1rem;
  box-shadow: 0 2px 12px var(--shadow);
}
.abend-wrap::before {
  content: '';
  display: block; height: 3px; border-radius: 3px;
  background: linear-gradient(90deg, var(--r5), var(--r1), var(--r3));
  margin-bottom: .7rem;
}
.abend-label {
  font-family: 'Raleway', sans-serif; font-size: .6rem;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--r5); font-weight: 700; margin-bottom: .5rem;
}
.abend-raum-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .35rem 0; border-bottom: 1px dashed rgba(42,26,8,.08);
}
.abend-raum-row:last-child { border-bottom: none; }
.abend-raum-emoji { font-size: 1rem; width: 24px; flex-shrink: 0; }
.abend-raum-name {
  font-family: 'Caveat', cursive; font-size: .9rem; font-weight: 700;
  min-width: 90px; flex-shrink: 0;
}
.abend-raum-inp {
  flex: 1; border: none; border-bottom: 1px dashed rgba(42,26,8,.15);
  outline: none; background: transparent;
  font-family: 'Caveat', cursive; font-size: .95rem; color: var(--ink);
  padding: .1rem .2rem;
}
.abend-raum-inp::placeholder { color: rgba(42,26,8,.2); font-style: italic; }
.abend-save-btn {
  margin-top: .7rem;
  background: var(--r5); color: white; border: none;
  border-radius: 20px; padding: .4rem 1.1rem;
  font-family: 'Raleway', sans-serif; font-weight: 700; font-size: .82rem;
  cursor: pointer; display: flex; align-items: center; gap: .3rem;
}

/* ── wimpelkette ── */
.wimpel { overflow: hidden; height: 24px; }
.wimpel svg { width: 100%; display: block; }

/* ── animations ── */
@keyframes reingehüpft {
  from { transform: scale(.96) translateY(8px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.raum-overlay.offen { animation: reingehüpft .3s cubic-bezier(.34,1.2,.64,1); }

@keyframes schreiben {
  from { opacity: 0; transform: translateX(-4px); }
  to   { opacity: 1; transform: translateX(0); }
}
.eintrag-item { animation: schreiben .25s ease; }

/* bottom nav back */
.bottom-back {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,253,245,.95); border-top: 1px solid var(--border);
  padding: .6rem 1rem; display: flex; justify-content: center;
  backdrop-filter: blur(4px); z-index: 50;
}
.bottom-back a {
  font-family: 'Caveat', cursive; font-size: 1rem;
  color: var(--muted); text-decoration: none;
  display: flex; align-items: center; gap: .4rem;
}
</style>
</head>
<body>

<!-- WIMPELKETTE -->
<div class="wimpel">
  <svg viewBox="0 0 400 24" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="3" x2="400" y2="3" stroke="rgba(192,57,43,0.2)" stroke-width="1"/>
    <g id="wimpelG"></g>
  </svg>
</div>

<!-- HEADER -->
<header>
  <div class="header-row">
    <button class="back-btn" onclick="history.back()">← zurück</button>
    <div class="header-title">🎨 Mein Atelier</div>
    <div style="width:60px"></div>
  </div>
  <div class="header-date" id="headerDate"></div>
</header>

<!-- MORGEN-FRAGE -->
<div class="morgen-frage" id="morgenFrage">
  <div class="morgen-frage-label">✦ Frage des Tages</div>
  <div class="morgen-frage-text" id="morgenFrageText">Welchen Raum betrete ich heute mit voller Aufmerksamkeit?</div>
</div>

<!-- RAUM GRID -->
<div class="atelier-grid" id="atelierGrid"></div>

<!-- ABEND REFLEXION -->
<div class="abend-wrap" id="abendWrap">
  <div class="abend-label">🌙 Abendreflexion — Was ist heute entstanden?</div>
  <div id="abendRaeume"></div>
  <button class="abend-save-btn" onclick="abendSpeichern()">🌿 festhalten</button>
</div>

<!-- RAUM OVERLAY -->
<div class="raum-overlay" id="raumOverlay">
  <div class="raum-overlay-header">
    <button class="raum-overlay-back" onclick="schliesseRaum()">← verlassen</button>
    <div class="raum-overlay-title" id="overlayTitle"></div>
    <div class="raum-overlay-emoji" id="overlayEmoji"></div>
  </div>
  <div class="raum-overlay-body" id="overlayBody"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-back">
  <a href="index.html">🏠 zurück zur Hauptseite</a>
</div>

<script>
// ── Wimpelkette ──
(function(){
  var g=document.getElementById('wimpelG');
  var cols=['#c0392b','#c8993a','#4a7c59','#7a9e5a','#b05a2a','#6b4f8a','#3a6a8a','#a0522d'];
  var tw=400/20;
  for(var i=0;i<20;i++){
    var c=cols[i%cols.length];
    var t=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    t.setAttribute('points',(i*tw)+',3 '+(i*tw+tw)+',3 '+(i*tw+tw/2)+',23');
    t.setAttribute('fill',c); t.setAttribute('opacity','0.5');
    g.appendChild(t);
  }
})();

// ── Date ──
var DAYS=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
var MONTHS=['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var today=new Date();
var dateKey=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
document.getElementById('headerDate').textContent=DAYS[today.getDay()]+', '+today.getDate()+'. '+MONTHS[today.getMonth()]+' '+today.getFullYear();

// ── Räume ──
var RAEUME=[
  {id:'spiritualitaet', name:'Spiritualität',     emoji:'🕯️', farbe:'#c0392b',
   frage:'Was nährt heute meine Stille — und meine Verbindung mit dem Größeren?',
   stimmungen:['🌅 erwacht','✨ leuchtend','🌿 ruhend','🌑 suchend','🙏 dankbar']},
  {id:'beruf',          name:'Beruf & Weiter­bildung', emoji:'📚', farbe:'#4a7c59',
   frage:'Was will ich heute erschaffen oder lernen — aus Freude, nicht aus Angst?',
   stimmungen:['🌱 wachsend','🔥 fließend','🌾 reifend','💤 schläft','🎯 fokussiert']},
  {id:'beziehungen',    name:'Beziehungen',        emoji:'🌸', farbe:'#c8993a',
   frage:'Welcher Mensch bekommt heute ein Stück meiner echten Aufmerksamkeit?',
   stimmungen:['💛 warm','🌊 tief','🌸 zart','🌫️ Distanz','✨ lebendig']},
  {id:'koerper',        name:'Körper & Gesundheit', emoji:'🌿', farbe:'#b05a2a',
   frage:'Was braucht mein Körper heute — und was schenke ich ihm?',
   stimmungen:['💪 stark','🌊 fließend','🌿 sanft','😴 erschöpft','🌺 gepflegt']},
  {id:'persoenlichkeit',name:'Persönlichkeits­entwicklung', emoji:'🦋', farbe:'#6b4f8a',
   frage:'Welcher Gedanke oder welche Gewohnheit möchte sich heute verwandeln?',
   stimmungen:['🦋 im Werden','🌱 keimend','🔮 erkennend','🌑 ruhend','✨ klar']},
  {id:'finanzen',       name:'Finanzen & Wohnen',  emoji:'🏡', farbe:'#3a6a8a',
   frage:'Was möchte ich heute in meinem äußeren Leben ordnen oder gestalten?',
   stimmungen:['🌟 klar','🌊 fließend','🏗️ im Aufbau','😬 angespannt','🌿 stabil']},
  {id:'freizeit',       name:'Freizeit',            emoji:'🎨', farbe:'#7a9e5a',
   frage:'Was macht mich heute einfach glücklich — ohne Zweck und ohne Leistung?',
   stimmungen:['🎉 leicht','🎨 kreativ','🌿 ruhig','💤 Pause','✨ verspielt']},
  {id:'familie',        name:'Familie & Tiere',     emoji:'🐾', farbe:'#a0522d',
   frage:'Was gebe ich heute meinen Liebsten — Rudi, Timmy, Lotte, Thomas?',
   stimmungen:['🐾 verbunden','💛 nährend','🌸 zärtlich','😔 vermissend','🌺 präsent']},
];

var MORGEN_FRAGEN=[
  'Welchen Raum betrete ich heute mit voller Aufmerksamkeit?',
  'Was will ich heute erschaffen — in welchem Teil meines Lebens?',
  'Welcher Bereich meines Lebens flüstert mir heute etwas zu?',
  'Wo möchte ich heute mehr sein als gestern?',
  'Was darf heute wachsen?',
];
document.getElementById('morgenFrageText').textContent=MORGEN_FRAGEN[today.getDay()%MORGEN_FRAGEN.length];

// ── Storage helpers ──
function lese(key){ try{ return JSON.parse(localStorage.getItem(key)||'null'); }catch(e){ return null; } }
function schreibe(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }

function raumKey(id){ return 'atelier_'+id+'_'+dateKey; }
function verlaufKey(id){ return 'atelier_verlauf_'+id; }

// ── Grid rendern ──
function renderGrid(){
  var grid=document.getElementById('atelierGrid');
  grid.innerHTML='';
  RAEUME.forEach(function(r){
    var data=lese(raumKey(r.id))||{stimmung:'',text:'',besucht:false};
    var div=document.createElement('div');
    div.className='raum-karte'+(data.besucht?' offen':'');
    div.style.setProperty('--current-color',r.farbe);
    div.style.borderColor=data.besucht?r.farbe+'55':'';

    // color bar
    div.style.cssText+='; --bar-color:'+r.farbe;

    var barEl=document.createElement('div');
    barEl.style.cssText='position:absolute;top:0;left:0;right:0;height:4px;border-radius:18px 18px 0 0;background:'+r.farbe+';opacity:'+(data.besucht?'1':'0.35')+';';
    div.appendChild(barEl);

    div.innerHTML+=
      '<div class="raum-emoji">'+r.emoji+'</div>'
      +'<div class="raum-name" style="color:'+r.farbe+'">'+r.name+'</div>'
      +'<div class="raum-status">'+(data.stimmung||'noch unbesucht')+'</div>'
      +'<div class="raum-stimmung-dots">'
        +[0,1,2,3,4].map(function(i){
          return '<div class="raum-dot'+(data.besucht&&i===0?' aktiv':'')+'" style="color:'+r.farbe+'"></div>';
        }).join('')
      +'</div>';
    div.onclick=function(){ betretenRaum(r); };
    grid.appendChild(div);
  });
}

// ── Raum betreten ──
var aktuellerRaum=null;
function betretenRaum(r){
  aktuellerRaum=r;
  var data=lese(raumKey(r.id))||{stimmung:'',text:'',besucht:false};
  var overlay=document.getElementById('raumOverlay');
  document.getElementById('overlayTitle').textContent=r.emoji+' '+r.name;
  document.getElementById('overlayEmoji').textContent='';
  overlay.style.setProperty('--current-color',r.farbe);

  // build body
  var body=document.getElementById('overlayBody');
  body.innerHTML='';

  // Stimmung
  var stSection=document.createElement('div');
  stSection.className='stimmung-section';
  stSection.innerHTML='<div class="section-label">Wie ist dieser Raum heute?</div>';
  var stRow=document.createElement('div');
  stRow.className='stimmung-optionen';
  r.stimmungen.forEach(function(s){
    var btn=document.createElement('button');
    btn.className='stimmung-btn'+(data.stimmung===s?' aktiv':'');
    if(data.stimmung===s){btn.style.background=r.farbe;}
    btn.textContent=s;
    btn.onclick=function(){
      stRow.querySelectorAll('.stimmung-btn').forEach(function(b){b.classList.remove('aktiv');b.style.background='';});
      btn.classList.add('aktiv'); btn.style.background=r.farbe;
      data.stimmung=s; autoSave();
    };
    stRow.appendChild(btn);
  });
  stSection.appendChild(stRow);
  body.appendChild(stSection);

  // Frage + Textarea
  var frSection=document.createElement('div');
  frSection.className='frage-section';
  frSection.innerHTML='<div class="atelier-frage">'+r.frage+'</div>';
  var ta=document.createElement('textarea');
  ta.className='atelier-textarea';
  ta.placeholder='Was entsteht hier heute …';
  ta.value=data.text||'';
  ta.style.borderColor=r.farbe+'44';
  ta.oninput=function(){data.text=ta.value; autoSave();};
  frSection.appendChild(ta);
  body.appendChild(frSection);

  // Aufgabe hinzufügen
  var aufSection=document.createElement('div');
  aufSection.className='aufgabe-section';
  aufSection.innerHTML='<div class="section-label">Aufgabe in den Tagesplan</div>';
  var aufRow=document.createElement('div');
  aufRow.className='aufgabe-input-row';
  var aufInp=document.createElement('input');
  aufInp.className='aufgabe-inp';
  aufInp.type='text';
  aufInp.placeholder='Aufgabe …';
  aufInp.style.borderColor=r.farbe+'44';
  var aufSel=document.createElement('select');
  aufSel.className='aufgabe-phase-sel';
  [{v:'morgen',l:'🌅 Morgen'},{v:'vormittag',l:'🌾 Unterwegs'},{v:'nachhause',l:'🏡 Heim'},{v:'abend',l:'🌙 Abend'},{v:'alle',l:'✦ Alle'}].forEach(function(opt){
    var o=document.createElement('option');o.value=opt.v;o.textContent=opt.l;aufSel.appendChild(o);
  });
  var aufBtn=document.createElement('button');
  aufBtn.className='aufgabe-add-btn';
  aufBtn.style.background=r.farbe;
  aufBtn.textContent='+ hinzu';
  aufBtn.onclick=function(){
    var name=aufInp.value.trim();
    if(!name)return;
    // inject into maufgItems in parent index if accessible, else use localStorage
    var dk=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
    var mKey='maufg_'+dk;
    var items=[]; try{items=JSON.parse(localStorage.getItem(mKey)||'[]');}catch(e){}
    items.push({id:Date.now(),name:name,phase:aufSel.value,done:false,raum:r.id});
    try{localStorage.setItem(mKey,JSON.stringify(items));}catch(e){}
    aufInp.value='';
    aufBtn.textContent='✓ gespeichert';
    setTimeout(function(){aufBtn.textContent='+ hinzu';},1500);
  };
  aufRow.appendChild(aufInp); aufRow.appendChild(aufSel); aufRow.appendChild(aufBtn);
  aufSection.appendChild(aufRow);
  body.appendChild(aufSection);

  // Save row
  var saveRow=document.createElement('div');
  saveRow.className='raum-save-row';
  var saveBtn=document.createElement('button');
  saveBtn.className='raum-save-btn';
  saveBtn.style.background=r.farbe;
  saveBtn.textContent='🌿 Raum verlassen & speichern';
  saveBtn.onclick=function(){ speichereRaum(data); };
  var savedLbl=document.createElement('span');
  savedLbl.className='raum-gespeichert';
  savedLbl.id='raumGespeichert';
  savedLbl.textContent='gespeichert ✦';
  saveRow.appendChild(saveBtn); saveRow.appendChild(savedLbl);
  body.appendChild(saveRow);

  // Vergangene Einträge
  var verlauf=lese(verlaufKey(r.id))||[];
  if(verlauf.length){
    var vSection=document.createElement('div');
    vSection.className='eintraege-section';
    vSection.innerHTML='<div class="section-label" style="margin-top:1.2rem">Frühere Besuche</div>';
    verlauf.slice(-5).reverse().forEach(function(e){
      var item=document.createElement('div');
      item.className='eintrag-item';
      item.style.borderLeftColor=r.farbe;
      item.style.borderLeftWidth='3px';
      item.innerHTML='<div class="eintrag-datum">'+e.datum+'</div>'
        +(e.stimmung?'<div class="eintrag-stimmung">'+e.stimmung+'</div>':'')
        +(e.text?'<div class="eintrag-text">'+e.text+'</div>':'');
      vSection.appendChild(item);
    });
    body.appendChild(vSection);
  }

  data.besucht=true;
  autoSave();
  overlay.classList.add('offen');
  overlay.scrollTop=0;

  function autoSave(){
    schreibe(raumKey(r.id),data);
    renderGrid();
  }
}

function speichereRaum(data){
  if(!aktuellerRaum)return;
  schreibe(raumKey(aktuellerRaum.id),data);
  // add to Verlauf
  var verlauf=lese(verlaufKey(aktuellerRaum.id))||[];
  // update today's entry
  verlauf=verlauf.filter(function(e){return e.datum!==dateKey;});
  if(data.text||data.stimmung){
    verlauf.push({datum:dateKey,stimmung:data.stimmung,text:data.text});
  }
  schreibe(verlaufKey(aktuellerRaum.id),verlauf);
  var lbl=document.getElementById('raumGespeichert');
  if(lbl){lbl.style.display='inline';setTimeout(function(){lbl.style.display='none';},2000);}
  renderGrid();
  schliesseRaum();
}

function schliesseRaum(){
  document.getElementById('raumOverlay').classList.remove('offen');
  aktuellerRaum=null;
}

// ── Abend-Reflexion ──
function renderAbend(){
  var wrap=document.getElementById('abendRaeume');
  wrap.innerHTML='';
  RAEUME.forEach(function(r){
    var row=document.createElement('div');
    row.className='abend-raum-row';
    var savedAbend=lese('atelier_abend_'+r.id+'_'+dateKey)||'';
    row.innerHTML='<div class="abend-raum-emoji">'+r.emoji+'</div>'
      +'<div class="abend-raum-name" style="color:'+r.farbe+'">'+r.name.split('­')[0]+'</div>';
    var inp=document.createElement('input');
    inp.className='abend-raum-inp';
    inp.type='text';
    inp.placeholder='ein Satz …';
    inp.value=savedAbend;
    inp.id='abend_'+r.id;
    inp.style.borderColor=r.farbe+'33';
    row.appendChild(inp);
    wrap.appendChild(row);
  });
}

function abendSpeichern(){
  RAEUME.forEach(function(r){
    var inp=document.getElementById('abend_'+r.id);
    if(inp&&inp.value.trim()){
      schreibe('atelier_abend_'+r.id+'_'+dateKey, inp.value.trim());
    }
  });
  var btn=document.querySelector('.abend-save-btn');
  btn.textContent='✓ gespeichert';
  setTimeout(function(){btn.textContent='🌿 festhalten';},2000);
}

// ── Init ──
renderGrid();
renderAbend();
</script>
</body>
</html>
